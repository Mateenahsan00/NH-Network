<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NH Network - Learning Dashboard</title>
  <!-- Using Inter and Montserrat as per the source design -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Montserrat:wght@600;700;800&display=swap"
    rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Inter", sans-serif;
    }

    /* 
       Global Variable Definitions 
       Defines the color palette, spacing, and transition constants used throughout the application
       to ensure a consistent dark-themed UI.
    */
    :root {
      --bg-dark: #0f1419;
      --bg-card: rgba(59, 130, 246, 0.08);
      --border-color: rgba(59, 130, 246, 0.15);
      --text-primary: #ffffff;
      --text-secondary: #cbd5e0;
      --text-muted: #a0aec0;
      --accent-blue: #3b82f6;
      --accent-purple: #8b5cf6;
      --success: #22c55e;
      --error: #ef4444;
      --warning: #f59e0b;
      --radius-lg: 16px;
      --radius-md: 10px;
      --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.3);
      --shadow-strong: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    /* 
       Base Body Styling 
       Sets the global background, text color, and layout constraints.
    */
    body {
      background: #0f1419;
      color: var(--text-primary);
      overflow-x: hidden;
      min-height: 100vh;
      position: relative;
    }

    /* 
       Animated Background Overlay
       Provides a subtle, non-intrusive gradient effect to enhance depth.
    */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse 80% 50% at 50% 0%, rgba(59, 130, 246, 0.1), transparent),
        radial-gradient(ellipse 80% 80% at 80% 80%, rgba(139, 92, 246, 0.08), transparent);
      pointer-events: none;
      z-index: -1;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* 
       Topbar Navigation Container
       Sticky header with a glassmorphism effect for persistent access to navigation.
    */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      width: 100%;
      padding: 1.5rem 5%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(15, 20, 25, 0.8);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(59, 130, 246, 0.1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    /* 
       Brand / Logo Component
       Displays the application identity with a modern gradient icon and text.
    */
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 20px;
      color: #ffffff;
      box-shadow: 0 8px 24px rgba(59, 130, 246, 0.3);
    }

    .logo-text {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* 
       Navigation Menu 
       Pill-shaped container for tab switches (Dashboard, My Courses, etc.).
    */
    .topbar-nav {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(59, 130, 246, 0.08);
      padding: 0.25rem;
      border-radius: 999px;
      border: 1px solid var(--border-color);
      backdrop-filter: blur(10px);
    }

    .nav-link {
      border: none;
      background: transparent;
      padding: 0.5rem 1rem;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.3s ease;
      white-space: nowrap;
    }

    /* Active navigation state with a glowing gradient effect. */
    .nav-link.active {
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      color: #ffffff;
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
    }

    .nav-link:hover:not(.active) {
      color: var(--text-primary);
      background: rgba(59, 130, 246, 0.1);
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    /* 
       User Rewards Pill
       Displays the learner's earned points in a subtle, translucent container.
    */
    .points-pill {
      padding: 0.5rem 1rem;
      border-radius: 999px;
      border: 1px solid rgba(139, 92, 246, 0.4);
      background: rgba(139, 92, 246, 0.15);
      font-size: 13px;
      color: #e0e7ff;
      font-weight: 600;
      backdrop-filter: blur(10px);
    }

    /* 
       User Profile Avatar
       A circular placeholder showing user initials with a vibrant gradient.
    */
    .avatar-circle {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      color: #ffffff;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
    }

    /* 
       Reusable Button Components
       Provides standard, ghost, and secondary button variations with hover animations.
    */
    .btn,
    .btn-ghost,
    .icon-btn {
      border-radius: var(--radius-md);
      border: none;
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      color: #ffffff;
      font-weight: 600;
      font-size: 14px;
      padding: 0.85rem 2rem;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      text-decoration: none;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(59, 130, 246, 0.4);
    }

    .btn:hover,
    .icon-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(59, 130, 246, 0.6);
    }

    .btn-ghost {
      background: transparent;
      color: var(--accent-blue);
      border: 1px solid var(--accent-blue);
      box-shadow: none;
      padding: 0.85rem 2rem;
    }

    .btn-ghost:hover {
      background: rgba(59, 130, 246, 0.1);
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.1);
    }

    .icon-btn.secondary {
      background: rgba(139, 92, 246, 0.15);
      color: #e0e7ff;
      border: 1.5px solid rgba(139, 92, 246, 0.4);
      backdrop-filter: blur(10px);
      box-shadow: none;
    }

    .icon-btn.secondary:hover {
      background: rgba(139, 92, 246, 0.25);
      border-color: rgba(139, 92, 246, 0.6);
      box-shadow: 0 8px 24px rgba(139, 92, 246, 0.3);
    }

    .icon-btn[disabled],
    .btn[disabled],
    .btn-ghost[disabled] {
      opacity: 0.45;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
      background: rgba(59, 130, 246, 0.05);
    }

    /* 
       Main Content Area
       Centered container for the application's tab panels and content.
    */
    .app-main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 3rem 24px 40px;
    }

    .tab-panel {
      display: block;
    }

    .tab-panel[hidden] {
      display: none;
    }

    /* 
       Page Headers
       Styled with text-clipping gradients for a high-end visual appeal.
    */
    .page-title {
      font-size: 40px;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #ffffff 0%, #a0aec0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .page-subtitle {
      font-size: 16px;
      color: var(--text-secondary);
      margin-bottom: 2rem;
      line-height: 1.8;
    }

    /* 
       Statistical Summary Cards 
       Used on the dashboard to show high-level metrics like points and streaks.
    */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 1.5rem;
      margin-bottom: 3rem;
    }

    .stat-card {
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.08) 0%, rgba(139, 92, 246, 0.06) 100%);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 1.8rem;
      backdrop-filter: blur(20px);
      box-shadow: var(--shadow-soft);
      transition: all 0.4s ease;
    }

    .stat-card:hover {
      border-color: rgba(59, 130, 246, 0.4);
      transform: translateY(-8px);
      box-shadow: 0 20px 50px rgba(59, 130, 246, 0.2);
    }

    .stat-label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: var(--accent-blue);
      text-transform: uppercase;
      margin-bottom: 0.8rem;
    }

    .stat-value {
      font-size: 36px;
      font-weight: 900;
      background: linear-gradient(135deg, #ffffff, #cbd5e0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.6rem;
      letter-spacing: -1px;
    }

    .stat-meta {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    /* End Stat Cards */

    /* 
       Two-Column Grid Layout 
       Standardized layout for dashboard and course views, balancing main content and sidebars.
    */
    .layout-two-column {
      display: grid;
      grid-template-columns: minmax(0, 2.2fr) minmax(0, 1.1fr);
      gap: 2rem;
      align-items: flex-start;
      margin-bottom: 3rem;
    }

    /* 
       Universal Panel Component
       A modular container with consistent padding, borders, and backdrop blur.
    */
    .panel {
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.08) 0%, rgba(139, 92, 246, 0.06) 100%);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 2rem;
      backdrop-filter: blur(20px);
      box-shadow: var(--shadow-soft);
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
      gap: 8px;
    }

    .panel-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .panel-meta {
      font-size: 14px;
      color: var(--text-muted);
    }

    /* 
       Progress Tracking Row 
       Visualizes progress through courses using a text label and a percentage-based fill bar.
    */
    .progress-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 15px;
      font-size: 14px;
      color: var(--text-secondary);
      padding: 0.75rem 0;
      border-bottom: 1px solid rgba(59, 130, 246, 0.05);
    }

    .progress-row:last-child {
      border-bottom: none;
    }

    .progress-label {
      flex: 1 1 auto;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 500;
    }

    .progress-track {
      flex: 0 0 45%;
      background: rgba(139, 92, 246, 0.1);
      border-radius: 999px;
      height: 8px;
      overflow: hidden;
      border: 1px solid rgba(139, 92, 246, 0.3);
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
      border-radius: inherit;
      transition: width 0.4s ease;
    }

    .progress-value {
      flex: 0 0 auto;
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 600;
    }

    /* 
       Achievement List
       Displays unlocked milestones with a subtle dash-bordered layout.
    */
    .achievement-list {
      list-style: none;
      margin-top: 1rem;
    }

    .achievement-item {
      font-size: 14px;
      color: var(--text-secondary);
      padding: 0.75rem 0;
      border-bottom: 1px dashed rgba(59, 130, 246, 0.1);
      transition: color 0.3s ease;
    }

    .achievement-item:hover {
      color: var(--text-primary);
    }

    .achievement-item:last-child {
      border-bottom: none;
    }

    /* 
       Course Display Grid & Cards
       Handles the layout and individual card styling for available courses.
    */
    .course-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 2rem;
      margin-top: 1rem;
    }

    .course-card {
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.08) 0%, rgba(139, 92, 246, 0.06) 100%);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      backdrop-filter: blur(20px);
      box-shadow: var(--shadow-soft);
      transition: transform 0.3s ease, border-color 0.3s ease;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .course-card:hover:not(:has(button[disabled])) {
      transform: translateY(-5px);
      border-color: rgba(59, 130, 246, 0.4);
    }

    .course-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }

    .course-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent-blue);
      letter-spacing: -0.5px;
    }

    /* Small badge for course metadata (e.g., Difficulty) */
    .course-chip {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid rgba(139, 92, 246, 0.4);
      color: #e0e7ff;
      background: rgba(139, 92, 246, 0.15);
      font-weight: 600;
    }

    .course-description {
      font-size: 13px;
      color: var(--text-secondary);
      min-height: 36px;
      line-height: 1.6;
    }

    .course-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
    }

    .label-subtle {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* Locked state visual for courses not yet accessible. */
    .lock-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      padding: 5px 10px;
      border-radius: 999px;
      border: 1px solid var(--error);
      background: rgba(239, 68, 68, 0.1);
      color: var(--error);
      font-weight: 600;
    }

    .lock-pill span.symbol {
      font-size: 14px;
    }

    .text-success {
      font-size: 13px;
      color: var(--success);
      font-weight: 600;
    }

    /* 
       Empty State Visual
       Displayed when no courses are found or enrolled.
    */
    .empty-state {
      border-radius: var(--radius-lg);
      border: 2px dashed rgba(59, 130, 246, 0.2);
      padding: 2rem;
      font-size: 14px;
      color: var(--text-muted);
      background: rgba(59, 130, 246, 0.05);
      text-align: center;
    }

    /* 
       My Courses Row Styling 
       Horizontal layout for enrolled courses with progress bars.
    */
    .courses-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .course-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 1rem;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-color);
      background: rgba(59, 130, 246, 0.05);
      transition: all 0.3s ease;
    }

    .course-row:hover {
      background: rgba(59, 130, 246, 0.1);
    }

    .course-row-main {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .course-row-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .course-row-meta {
      font-size: 13px;
      color: var(--text-muted);
    }

    .course-row-actions {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .course-row-progress {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
    }

    .course-row-progress .progress-track {
      flex-basis: 180px;
    }

    /* 
       Course Learning Interface (Player Layout) 
       Main player view with a lesson sidebar and a central content area.
    */
    .learn-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.6fr) minmax(0, 2.1fr);
      gap: 2rem;
      align-items: flex-start;
      margin-top: 1.5rem;
    }

    .course-player {
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.08) 0%, rgba(139, 92, 246, 0.06) 100%);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 2rem;
      backdrop-filter: blur(20px);
      box-shadow: var(--shadow-soft);
      min-height: 400px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .course-player-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid rgba(59, 130, 246, 0.1);
    }

    .course-player-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .course-player-subtitle {
      font-size: 14px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* Scrollable Lesson List Sidebar */
    .lesson-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      max-height: 400px;
      overflow-y: auto;
      padding-right: 8px;
    }

    .lesson-item {
      border-radius: var(--radius-md);
      border: 1px solid rgba(59, 130, 246, 0.1);
      padding: 0.8rem 1rem;
      background: rgba(59, 130, 246, 0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      font-size: 14px;
      color: var(--text-secondary);
      transition: all 0.2s ease;
    }

    .lesson-item-main {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .lesson-index {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 600;
      flex-shrink: 0;
    }

    .lesson-title {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .lesson-state {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .lesson-item:hover {
      background: rgba(59, 130, 246, 0.1);
    }

    .lesson-item.active {
      border-color: var(--accent-blue);
      background: rgba(59, 130, 246, 0.15);
      color: var(--text-primary);
    }

    .lesson-item.completed .lesson-index {
      background: var(--success);
      color: #ffffff;
      border-color: var(--success);
    }

    .lesson-item.locked {
      cursor: not-allowed;
      background: rgba(139, 92, 246, 0.03);
      color: var(--text-muted);
    }

    .lesson-item.locked .lesson-index {
      border-style: dashed;
      color: var(--text-muted);
      background: transparent;
    }

    .lesson-lock-icon {
      font-size: 12px;
    }

    /* Container for the video player itself */
    .lesson-player-frame {
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-color);
      background: rgba(15, 20, 25, 0.5);
      padding: 1.5rem;
      min-height: 250px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .lesson-player-heading {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .lesson-player-meta {
      font-size: 13px;
      color: var(--text-muted);
    }

    .video-placeholder {
      margin-top: 1rem;
      border-radius: var(--radius-md);
      border: 2px dashed rgba(59, 130, 246, 0.2);
      background: rgba(15, 20, 25, 0.2);
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: var(--text-muted);
    }

    .lesson-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-top: 1rem;
    }

    /* Milestone indicator (e.g., Certificate Unlocked) */
    .certificate-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 999px;
      border: 1px solid var(--success);
      background: rgba(34, 197, 94, 0.1);
      font-size: 13px;
      color: var(--success);
      font-weight: 600;
    }

    /* 
       Modal for Certificates 
       Overlays the entire screen with a focused certificate view.
    */
    .certificate-modal {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .certificate-modal[hidden] {
      display: none;
    }

    .certificate-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
    }

    .certificate-content {
      position: relative;
      background: linear-gradient(135deg, rgba(20, 28, 35, 0.95) 0%, rgba(30, 40, 50, 0.95) 100%);
      border: 1px solid rgba(59, 130, 246, 0.2);
      border-radius: 20px;
      box-shadow: var(--shadow-strong);
      padding: 2.5rem;
      max-width: 450px;
      width: 100%;
      color: var(--text-primary);
    }

    .certificate-title {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 0.75rem;
      color: var(--accent-blue);
    }

    .certificate-text {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 1.5rem;
      line-height: 1.7;
    }

    .certificate-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    /* 
       Profile Layout 
       A specialized view for learner identity and submitted details.
    */
    .profile-layout {
      display: grid;
      grid-template-columns: minmax(0, 0.9fr) minmax(0, 1.1fr);
      gap: 2rem;
      align-items: start;
    }

    .profile-card {
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.08) 0%, rgba(139, 92, 246, 0.06) 100%);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      backdrop-filter: blur(20px);
      box-shadow: var(--shadow-soft);
    }

    .profile-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.2rem;
    }

    .profile-dp {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      border: 2.5px solid rgba(59, 130, 246, 0.35);
      box-shadow: 0 8px 24px rgba(59, 130, 246, 0.25);
      background: rgba(59, 130, 246, 0.08);
    }

    .profile-title {
      font-size: 20px;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: 0.2px;
    }

    .profile-sub {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .profile-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 1rem;
    }

    .profile-item {
      border-radius: var(--radius-md);
      border: 1px solid var(--border-color);
      padding: 1rem;
      background: rgba(59, 130, 246, 0.05);
    }

    .profile-label {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .profile-value {
      font-size: 16px;
      font-weight: 600;
      color: #e5e7eb;
    }

    @media (max-width: 1024px) {
      .profile-layout {
        grid-template-columns: minmax(0, 1fr);
      }

      .profile-grid {
        grid-template-columns: minmax(0, 1fr);
      }

      .profile-dp {
        width: 84px;
        height: 84px;
      }
    }

    @media (max-width: 600px) {
      .profile-dp {
        width: 72px;
        height: 72px;
      }
    }

    /* Footer Component */
    footer {
      text-align: center;
      padding: 3rem 5%;
      border-top: 1px solid rgba(59, 130, 246, 0.1);
      background: rgba(15, 20, 25, 0.5);
      font-size: 13px;
      color: var(--text-muted);
      margin-top: auto;
    }

    footer a {
      color: #3b82f6;
      text-decoration: none;
      margin: 0 0.5rem;
      font-weight: 600;
      transition: color 0.3s ease;
    }

    footer a:hover {
      color: #60a5fa;
    }

    /* End Footer */

    /* Media Queries */
    /* 
       Responsive Adjustments (Tablet & Mobile)
       Optimizes the layout for smaller screens by stacking columns and adjusting font sizes.
    */
    @media (max-width: 1024px) {
      .app-main {
        padding-inline: 16px;
      }

      .stat-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .course-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .layout-two-column,
      .learn-layout,
      .profile-layout {
        grid-template-columns: minmax(0, 1fr);
      }
    }

    @media (max-width: 768px) {
      .topbar {
        padding-inline: 16px;
        flex-wrap: wrap;
        gap: 8px 12px;
      }

      .topbar-left {
        width: 100%;
        justify-content: space-between;
      }

      .topbar-nav {
        order: 3;
        width: 100%;
        justify-content: space-between;
      }

      .topbar-right {
        order: 2;
      }

      .course-grid {
        grid-template-columns: minmax(0, 1fr);
      }

      .stat-grid {
        grid-template-columns: minmax(0, 1fr);
      }

      .page-title {
        font-size: 28px;
      }
    }

    /* 
       Animations & Micro-interactions 
       Standardized keyframes for UI transitions like fading and sliding.
    */
    @keyframes slideDown {
      0% {
        opacity: 0;
        transform: translateY(-6px);
      }

      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    @keyframes fadeOut {
      from {
        opacity: 1
      }

      to {
        opacity: 0
      }
    }

    .fade-enter {
      animation: fadeIn 180ms ease-out both;
    }

    .fade-leave {
      animation: fadeOut 160ms ease-in both;
    }

    /* Interactive Course Card Effects */
    .course-card-crypto {
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .course-card-crypto:hover {
      transform: translateY(-2px) scale(1.01);
      box-shadow: 0 14px 34px rgba(59, 130, 246, 0.25);
      border-color: rgba(59, 130, 246, 0.35);
    }

    .btn {
      transition: transform 0.12s ease, box-shadow 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-1px) scale(1.01);
      box-shadow: 0 8px 28px rgba(59, 130, 246, 0.45);
    }

    /* Accordion-style Course Expansion */
    .course-expansion {
      transition: max-height 260ms ease, opacity 200ms ease;
      opacity: 0;
      max-height: 0;
    }

    .course-expansion.open {
      opacity: 1;
      max-height: 900px;
      animation: slideDown 260ms ease both;
    }

    /* 
       Difficulty Badges
       Color-coded labels for Beginner, Intermediate, and Advanced courses.
    */
    .badge-level {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0.2rem 0.5rem;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid var(--border-color);
    }

    .badge-beginner {
      background: rgba(34, 197, 94, 0.12);
      color: #86efac;
      border-color: rgba(34, 197, 94, 0.25);
    }

    .badge-intermediate {
      background: rgba(59, 130, 246, 0.12);
      color: #93c5fd;
      border-color: rgba(59, 130, 246, 0.25);
    }

    .badge-advanced {
      background: rgba(234, 179, 8, 0.12);
      color: #fde68a;
      border-color: rgba(234, 179, 8, 0.25);
    }

    /* Dashboard Widgets (Summary & Recommended) */
    .summary-bar {
      display: flex;
      gap: 12px;
      align-items: center;
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 0.6rem 0.8rem;
      background: rgba(15, 20, 25, 0.6);
      margin-bottom: 12px;
    }

    .summary-item {
      display: flex;
      flex-direction: column;
    }

    .summary-item .label {
      font-size: 12px;
      color: var(--text-muted);
    }

    .summary-item .value {
      font-size: 16px;
      font-weight: 800;
      color: #e5e7eb;
    }

    .recommend-widget {
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 1rem;
      background: rgba(15, 20, 25, 0.6);
      margin-top: 12px;
    }

    .recommend-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    @media (max-width: 900px) {
      .recommend-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .recommend-grid {
        grid-template-columns: minmax(0, 1fr);
      }
    }

    /* Course Completion Indicator Dot */
    .course-status-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.2);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-left: 8px;
    }

    .course-status-dot.completed {
      background: #16a34a;
      border-color: #16a34a;
      color: #0b1b12;
    }

    .course-status-dot .check {
      display: none;
      font-size: 12px;
    }

    .course-status-dot.completed .check {
      display: block;
    }

    /* 
       Cryptocurrency-specific Course Cards 
       Unique styling for the crypto-themed dashboard cards.
    */
    .course-card-crypto {
      display: flex;
      gap: 12px;
      padding: 1rem;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-color);
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.08) 0%, rgba(139, 92, 246, 0.06) 100%);
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .course-card-crypto:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-soft);
    }

    .course-icon {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      background: rgba(59, 130, 246, 0.12);
    }

    /* Course Detail Expansion Sidebar/Drawer */
    .course-expansion {
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      margin-top: 10px;
      overflow: hidden;
      background: rgba(15, 20, 25, 0.6);
    }

    .expansion-header {
      padding: 1rem;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .expansion-body {
      padding: 1rem;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 1rem;
      max-height: 450px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--accent-blue) rgba(59, 130, 246, 0.05);
    }

    /* Custom scrollbar for a polished look in expansion panels */
    .expansion-body::-webkit-scrollbar {
      width: 6px;
    }

    .expansion-body::-webkit-scrollbar-track {
      background: rgba(59, 130, 246, 0.05);
      border-radius: 10px;
    }

    .expansion-body::-webkit-scrollbar-thumb {
      background: rgba(59, 130, 246, 0.4);
      border-radius: 10px;
    }

    .expansion-body::-webkit-scrollbar-thumb:hover {
      background: rgba(59, 130, 246, 0.7);
    }

    .expansion-section {
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      overflow: hidden;
    }

    .expansion-section>button {
      width: 100%;
      text-align: left;
      padding: 0.85rem 1rem;
      background: rgba(59, 130, 246, 0.08);
      color: #e5e7eb;
      border: none;
      font-weight: 700;
    }

    .expansion-section-list {
      display: none;
      padding: 0.5rem 0.5rem 0.75rem;
    }

    .expansion-section.open .expansion-section-list {
      display: block;
    }

    /* Individual Lecture Item Styling */
    .lecture-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 0.6rem 0.75rem;
      border-radius: 10px;
    }

    .lecture-item .left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .lecture-play {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(59, 130, 246, 0.12);
    }

    .lecture-item.done .label-subtle {
      color: #22c55e;
    }

    .lecture-item.active {
      box-shadow: 0 0 0 1px rgba(59, 130, 246, 0.45);
      background: rgba(59, 130, 246, 0.08);
    }

    .lecture-item.completed {
      background: rgba(40, 167, 69, 0.08);
      border-left: 3px solid #28a745;
    }

    .lecture-item.completed .lecture-play {
      background: rgba(40, 167, 69, 0.2);
    }

    /* Quiz-specific Lecture Item Styling */
    .quiz-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 0.6rem 0.75rem;
      border-radius: 10px;
      background: rgba(239, 68, 68, 0.08);
      border: 1px dashed rgba(239, 68, 68, 0.25);
    }

    /* Footer Action Bar for Enrolling */
    .enroll-bar {
      display: flex;
      justify-content: flex-end;
      padding: 1rem;
      border-top: 1px solid var(--border-color);
    }

    /* 
       Toast Notification Component 
       Used for short-lived feedback messages (e.g., "Enrolled successfully").
    */
    .toast {
      position: fixed;
      right: 24px;
      bottom: 24px;
      background: #111827;
      color: #e5e7eb;
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 0.8rem 1rem;
      box-shadow: var(--shadow-strong);
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* Video Player Layout Grid */
    .player-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.6fr) minmax(0, 1fr);
      gap: 16px;
    }

    .video-frame {
      width: 100%;
      aspect-ratio: 16/9;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      background: #0f1419;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      color: #e5e7eb;
    }

    .player-controls {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    /* Tabs within the Video Player */
    .player-tabs {
      margin-top: 14px;
    }

    .player-tab-buttons {
      display: flex;
      gap: 6px;
    }

    .player-tab-buttons button {
      padding: 0.6rem 0.8rem;
      border-radius: 10px;
      border: 1px solid var(--border-color);
      background: rgba(59, 130, 246, 0.06);
      color: #e5e7eb;
    }

    .player-tab-buttons button.active {
      background: rgba(59, 130, 246, 0.18);
    }

    .player-tab-content {
      margin-top: 10px;
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 0.9rem;
      background: rgba(15, 20, 25, 0.6);
    }

    /* Note-taking Interface Styles */
    .notes-input {
      display: flex;
      gap: 8px;
    }

    .notes-input input {
      flex: 1;
      padding: 0.6rem 0.8rem;
      border-radius: 10px;
      border: 1px solid var(--border-color);
      background: rgba(15, 20, 25, 0.6);
      color: #e5e7eb;
    }

    .notes-list {
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .note-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 0.6rem 0.8rem;
    }

    /* Circular Progress Indicator for Courses */
    .progress-circle {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: conic-gradient(#3b82f6 var(--p), rgba(59, 130, 246, 0.12) 0);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      color: #e5e7eb;
    }

    /* Lesson Sidebar Component */
    .sidebar {
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 0.8rem;
      background: rgba(15, 20, 25, 0.6);
    }

    .sidebar-section {
      border: 1px solid var(--border-color);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .sidebar-section>button {
      width: 100%;
      text-align: left;
      padding: 0.7rem 0.8rem;
      background: rgba(59, 130, 246, 0.08);
      border: none;
      color: #e5e7eb;
      font-weight: 700;
    }

    .sidebar-list {
      display: none;
    }

    .sidebar-section.open .sidebar-list {
      display: block;
    }

    @media (max-width: 900px) {
      .player-grid {
        grid-template-columns: minmax(0, 1fr);
      }
    }
  </style>
</head>

<body>
  <!-- 
       Topbar Header
       Contains the brand logo, primary navigation links, user points, and session controls.
  -->
  <header class="topbar">
    <div class="topbar-left">
      <a href="/" class="brand" id="logoBrand">
        <div class="logo-icon">NH</div>
        <div class="logo-text">NETWORK</div>
      </a>

      <nav class="topbar-nav" aria-label="Learning navigation">
        <button class="nav-link active" data-tab="dashboard">Dashboard</button>
        <button class="nav-link" data-tab="my-courses">My Courses</button>
        <button class="nav-link" data-tab="learn">Learn</button>
        <button class="nav-link" data-tab="profile">Profile</button>
      </nav>
    </div>
    <div class="topbar-right">
      <!-- User point balance indicator -->
      <div class="points-pill" id="points-display">Points: 0</div>

      <!-- User initials placeholder -->
      <div class="avatar-circle" id="headerAvatar">NH</div>

      <!-- Quick access to main dashboard -->
      <button class="btn" id="homeBtn" onclick="window.location.href='dashboard.html'">Home</button>

      <!-- Terminates current user session -->
      <button class="icon-btn secondary" id="logoutBtn" onclick="logoutFunction()">Logout</button>
    </div>

    <script>
      /**
       * Handles user logout by clearing session data and redirecting to the landing page.
       */
      function logoutFunction() {
        alert('Logged out successfully!');
        window.location.href = 'index.html';
      }
    </script>

  </header>

  <!-- 
       Main Application Content 
       The central mounting point for all dynamic tab content (Dashboard, Courses, etc.).
  -->
  <main class="app-main">
    <section class="tab-panel" id="tab-dashboard" aria-labelledby="tab-dashboard-label"></section>
    <section class="tab-panel" id="tab-my-courses" aria-labelledby="tab-my-courses-label" hidden></section>
    <section class="tab-panel" id="tab-learn" aria-labelledby="tab-learn-label" hidden></section>
    <section class="tab-panel" id="tab-profile" aria-labelledby="tab-profile-label" hidden></section>
  </main>

  <!-- 
       Certificate Achievement Modal 
       Displayed when a user successfully completes a course and unlocks a certificate.
  -->
  <div class="certificate-modal" id="certificateModal" hidden>
    <div class="certificate-backdrop" id="certificateBackdrop"></div>
    <div class="certificate-content" role="dialog" aria-modal="true">
      <h3 class="certificate-title">Course Certificate Unlocked</h3>
      <p class="certificate-text" id="certificateCourseName"></p>
      <p class="certificate-text">This is a visual placeholder for your certificate. In a full implementation, this is
        where a downloadable PDF or shareable image would appear.</p>
      <div class="certificate-footer">
        <button class="btn-ghost" id="closeCertificateBtn">Close</button>
      </div>
    </div>
  </div>

  <!-- Application Footer -->
  <footer>
    <p>© 2025 NH Network. All Rights Reserved.</p>
  </footer>

  <!-- 
       Floating Action Button (FAB) 
       Persistent call-to-action for the Investor program.
  -->
  <div class="investor-fab" style="position:fixed;right:24px;bottom:24px;z-index:50;">
    <button class="btn" id="becomeInvestorBtn"
      style="padding:0.85rem 1.6rem;animation:subtlePulse 3.6s ease-in-out infinite;">Become an Investor</button>
  </div>

  <script src="notifications.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script>
    /**
     * Inject a pulse animation for the Investor FAB and handle its click event.
     * The script checks the user's investor status via an API before redirecting.
     */
    const pulseStyle = document.createElement('style');
    pulseStyle.textContent = `@keyframes subtlePulse{0%,100%{box-shadow:0 4px 20px rgba(59,130,246,0.4);transform:translateY(0)}50%{box-shadow:0 8px 30px rgba(59,130,246,0.6);transform:translateY(-1px)}}@media(max-width:600px){.investor-fab{right:16px!important;bottom:16px!important}}`;
    document.head.appendChild(pulseStyle);

    const investBtn = document.getElementById('becomeInvestorBtn');
    if (investBtn) {
      investBtn.addEventListener('click', async function () {
        const userId = localStorage.getItem('userId');
        if (!userId) {
          // Redirect to login if user session is not found
          window.location.href = 'index.html#login';
          return;
        }

        try {
          // Fetch current investor request status for the logged-in user
          const response = await fetch(`/api/investor/request/status?userId=${encodeURIComponent(userId)}`);
          const data = await response.json();

          if (data.success && data.status === 'approved') {
            // If already an approved investor, go to the investment dashboard
            window.location.href = 'investment.html';
          } else {
            // Otherwise, show the investor application page
            window.location.href = 'become-investor.html';
          }
        } catch (err) {
          console.error('Error checking investor status:', err);
          window.location.href = 'become-investor.html';
        }
      });
    }

    /**
     * Factory function to generate a course object with structured sections and units.
     * Used for programmatic generation of course content.
     * 
     * @param {string} id - Unique identifier for the course.
     * @param {string} title - Display name of the course.
     * @param {string} level - Difficulty level (Beginner, etc.).
     * @param {string} hours - Estimated time to complete.
     * @param {string} icon - Emoji or icon representation.
     * @returns {Object} - A complete course data object.
     */
    function buildCourse(id, title, level, hours, icon) {
      const totalLectures = 32;
      const sections = 4;
      const perSection = Math.floor(totalLectures / sections);
      const units = [];
      let count = 0;
      for (let s = 1; s <= sections; s += 1) {
        for (let i = 1; i <= perSection; i += 1) {
          count += 1;
          units.push({ type: 'lesson', title: `${title}: Lecture ${count}`, duration: `${4 + ((count % 3) + 1)} min`, section: s });
          if (count % 8 === 0) {
            const qNum = count / 8;
            units.push({ type: 'quiz', title: `Quiz ${qNum}: Assessment`, section: s });
          }
        }
      }
      const description = `${title} provides a practical, structured learning path to master concepts with real-world context. Built for ${level.toLowerCase()} learners, it balances theory and hands-on examples to help you apply skills confidently.`;
      const learnPoints = [
        'Core concepts and terminology',
        'Real-world applications and use cases',
        'Best practices and common pitfalls',

    /**
     * COURSES Array
     * Transforms the coursesData dictionary into a flat array of course objects
     * for easier iteration and rendering in the UI.
     */
    const COURSES = Object.keys(coursesData).map(id => {
      const c = coursesData[id];
      const units = [];
      c.sections.forEach((s, sIdx) => {
        s.lessons.forEach(l => {
          units.push({
            id: l.id || '',
            type: l.type,
            title: l.title,
            duration: l.duration || '',
            section: sIdx + 1,
            content: l.content || ''
          });
        });
      });
      return {
        id,

    /**
     * Application Default State
     * Represents the initial learning progress, profile, and UI state.
     */
    const DEFAULT_STATE = {
      activeTab: 'profile',
      activeCourseId: null,
      activeUnitIndex: 0,
      enrolledCourseId: null,
      points: 0,
      streak: 0,
      lastCompletionDate: null,
      profile: {
        fullName: 'Learner',
        email: 'learner@example.com'
      },
      courses: {},
      certRequests: {}
    };

    // Live state used by the application
    let state = { ...DEFAULT_STATE };

    /**
     * Loads the state from localStorage if available, merging with defaults.
     */
    function loadState() {
      try {
        const raw = localStorage.getItem('learningDashboardState');
        if (!raw) {
          state = { ...DEFAULT_STATE };
          return;
        }
        const parsed = JSON.parse(raw);
        state = {
          ...DEFAULT_STATE,
          ...parsed,
          profile: { ...DEFAULT_STATE.profile, ...(parsed.profile || {}) },
          courses: parsed.courses || {}
        };
        updateStreak(false);
      } catch (e) {
        state = { ...DEFAULT_STATE };
      }
    }

    let saveTimer = null;

    /**
     * Persists the current state to the backend server.
     */
    async function saveStateToServer() {
      try {
        const userId = parseInt(localStorage.getItem('userId'), 10);
        if (!userId) return;
        await fetch('/api/learning/state', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId, state })
        });
      } catch (_) { }
    }

    /**
     * Debounces state saving to minimize server requests during rapid updates.
     */
    function saveStateToServerDebounced() {
      try { if (saveTimer) clearTimeout(saveTimer); } catch (_) { }
      saveTimer = setTimeout(saveStateToServer, 500);
    }

    /**
     * Synchronizes and saves the application state to localStorage and the server.
     * Recalculates progress for all courses before saving.
     */
    function saveState() {
      if (typeof COURSES !== 'undefined') {
        Object.keys(state.courses).forEach(courseId => {
          const course = COURSES.find(c => c.id === courseId);
          if (course) {
            const p = getCourseProgress(course);
            state.courses[courseId].progress = p.completionPercent;
            state.courses[courseId].completed = p.completed;
          }
        });
      }

      try {
        localStorage.setItem('learningDashboardState', JSON.stringify(state));
      } catch (e) {
        // fail silently if storage is unavailable
      }
      saveStateToServerDebounced();
    }

    /**
     * Initializes the application state by fetching data from the server
     * or falling back to local storage.
     */
    async function initState() {
      const userIdRaw = localStorage.getItem('userId');
      const userId = parseInt(userIdRaw, 10);
      if (userId) {
        try {
          const [stateRes, certRes] = await Promise.all([
            fetch(`/api/learning/state?userId=${encodeURIComponent(userId)}`),
            fetch(`/api/certificate/status?userId=${encodeURIComponent(userId)}`)
          ]);

          const stateData = await stateRes.json();
          const certData = await certRes.json();

          const s = (stateData && stateData.state) || null;
          if (s && typeof s === 'object') {
            const parsed = s;
            state = {
              ...DEFAULT_STATE,
              ...parsed,
              profile: { ...DEFAULT_STATE.profile, ...(parsed.profile || {}) },
              courses: parsed.courses || {},
              certRequests: {}
            };

            if (certData.success && certData.requests) {
              certData.requests.forEach(r => {
                state.certRequests[r.course_id] = r.status;
              });
            }

            saveState();
            updateStreak(false);
            return;
          }
        } catch (_) { }
      }
      loadState();
    }

    /**
     * Calculates the completion percentage and status for a specific course.
     * 
     * @param {Object} course - The course object to evaluate.
     * @returns {Object} - Progress metrics including completion percent.
     */
    function getCourseProgress(course) {
      const units = Array.isArray(course.units) ? course.units : [];
      const cState = state.courses[course.id] || { completed: false, completedLessons: [], quizAttempts: {} };
      
      const totalItems = units.length;
      if (totalItems === 0) return { completedUnits: 0, completedLessons: 0, completed: false, completionPercent: 0 };

      let finishedCount = 0;
      let videoIdx = 0;
      const completedVideos = new Set(cState.completedLessons || []);

      units.forEach((u) => {
        if (u.type === 'video' || u.type === 'lesson') {
          if (completedVideos.has(videoIdx)) {
            finishedCount++;
          }
          videoIdx++;
        } else if (u.type === 'quiz') {
          const sectionIdx = u.section - 1;
          const attempts = cState.quizAttempts ? cState.quizAttempts[sectionIdx] : null;
          if (attempts && attempts.some(a => a.passed)) {
            finishedCount++;
          }
        }
      });

      const completionPercent = Math.round((finishedCount / totalItems) * 100);
      const completed = !!cState.completed || completionPercent === 100;
      
      return { 
        completedUnits: finishedCount, // Total items done
        completedLessons: completedVideos.size, // Total videos done
        completed, 
        completionPercent 
      };
    }

    /**
     * Computes global statistics for the user across all courses.
     * 
     * @returns {Object} - Aggregated metrics for the dashboard.
     */
    function computeStats() {
      let totalLessons = 0;
      let totalCompletedLessons = 0;
      let coursesStarted = 0;
      let coursesCompleted = 0;

      COURSES.forEach((course) => {
        const units = Array.isArray(course.units) ? course.units : [];
        const videoUnitsCount = units.filter(u => u.type === 'video' || u.type === 'lesson').length;
        totalLessons += videoUnitsCount;
        
        const p = getCourseProgress(course);
        totalCompletedLessons += p.completedLessons;
        if (p.completedUnits > 0) coursesStarted += 1;
        if (p.completed) coursesCompleted += 1;
      });

      const overallCompletion = totalLessons === 0
        ? 0
        : Math.round((totalCompletedLessons / totalLessons) * 100);

      return {
        totalCourses: COURSES.length,
        totalLessons,
        totalCompletedLessons,
        coursesStarted,
        coursesCompleted,
        overallCompletion,
        totalPoints: state.points || 0,
        streak: state.streak || 0
      };
    }

    /**
     * Determines which achievements the user has unlocked based on their stats.
     * 
     * @param {Object} stats - The statistics object from computeStats.
     * @returns {Array} - A list of achievement strings.
     */
    function computeAchievements(stats) {
      const achievements = [];

      if (stats.totalCompletedLessons >= 1) {
        achievements.push('First lesson completed');
      }
      if (stats.totalPoints >= 100) {
        achievements.push('100+ points earned');
      }
      if (stats.coursesCompleted >= 1) {
        achievements.push('First course completed');
      }
      if (state.streak >= 3) {
        achievements.push('3-day learning streak');
      }
      if (!achievements.length) {
        achievements.push('Start your first lesson to unlock achievements.');
      }

      return achievements;
    }

    /**
     * Switches the currently visible tab panel and updates navigation button styles.
     * 
     * @param {string} tabName - The ID suffix of the tab to activate.
     */
    function setActiveTab(tabName) {
      state.activeTab = tabName;
      saveState();

      const panels = document.querySelectorAll('.tab-panel');
      panels.forEach((panel) => {
        const id = panel.id.replace('tab-', '');
        if (id === tabName) {
          panel.removeAttribute('hidden');
          panel.classList.add('fade-enter');
          setTimeout(() => panel.classList.remove('fade-enter'), 220);
        } else {
          panel.setAttribute('hidden', 'hidden');
        }
      });

      const navLinks = document.querySelectorAll('.nav-link[data-tab]');
      navLinks.forEach((btn) => {
        if (btn.dataset.tab === tabName) {
          btn.classList.add('active');
        } else {
          btn.classList.remove('active');
        }
      });

      renderCurrentTab();
    }

    /**
     * Updates the points display and user avatar initials in the header.
     */
    function renderHeaderSummary() {
      const stats = computeStats();
      const pointsDisplay = document.getElementById('points-display');
      const headerAvatar = document.getElementById('headerAvatar');

      if (pointsDisplay) {
        pointsDisplay.textContent = `Points: ${stats.totalPoints}`;

      if (headerAvatar) {
        const name = state.profile.fullName || 'Learner';
        const initials = name
          .split(' ')
          .filter(Boolean)
          .slice(0, 2)
          .map((part) => part[0].toUpperCase())
          .join('') || 'LR';
        headerAvatar.textContent = initials;

    }

    /**

                          (cState.quizAttempts && Object.keys(cState.quizAttempts).length > 0);

        return isEnrolled || hasProgress || isCompleted;
      });

      const content = startedCourses.length === 0

          const p = getCourseProgress(course);

          let actionButtonHtml = '';
          if (p.completed) {
            const certStatus = state.certRequests[course.id] || null;
            let certBtnHtml = '';
            if (certStatus === 'Pending') {
              certBtnHtml = `<button class="btn" style="padding: 0.85rem 1.5rem; background: #6c757d; cursor: not-allowed;" disabled>Request Sent</button>`;

            } else {

        const hasActiveIncomplete = enrolledCourse ? !getCourseProgress(enrolledCourse).completed : false;
        const btnLabel = isEnrolled && !p.completed ? 'Start Course' : 'Enroll Now';

        return `
          <article class="course-card-crypto" data-recommend="${c.id}">

          const courseId = btn.getAttribute('data-open-course');
          if (!courseId) return;

      attachViewCertificateHandlers(container);

          if (!already) {
            enrollCourse(id);

            pushClientNotification({ type: 'course_enrolled', title: 'Course Enrolled', message: 'Enrollment successful.', courseId: id });
          }
          state.activeCourseId = id;
          state.activeUnitIndex = getCourseProgress(COURSES.find(c => c.id === id)).completedUnits;
          saveState();
          renderDashboardTab();
          renderMyCoursesTab();
          setActiveTab('my-courses');
