    /**
     * Attaches click event listeners for certificate application buttons.
     * Submits a request to the backend and updates the UI status.
     * 
     * @param {HTMLElement} container - The parent element containing the buttons.
     */
    function attachApplyCertificateHandlers(container) {
      container.querySelectorAll('[data-apply-certificate]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const courseId = btn.getAttribute('data-apply-certificate');
          const userId = localStorage.getItem('userId');
          if (!userId) {
            showToast('User ID not found. Please log in again.');
            return;
          }

          try {
            const response = await fetch('/api/certificate/request', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ userId, courseId })
            });
            const data = await response.json();
            if (data.success) {
              showToast(data.message || 'Your certificate request has been sent to admin for approval.', 'success');
              state.certRequests[courseId] = 'Pending';
              renderMyCoursesTab();
            } else {
              showToast(data.error || 'Failed to send request.');
            }
          } catch (err) {
            console.error('Apply certificate error:', err);
            showToast('Error sending request.');
          }
        });
      });
    }

    /**
     * Helper to get a human-readable title for a course unit.
     */
    function lessonTitleFor(course, index) {
      const units = Array.isArray(course.units) ? course.units : [];
      const u = units[index];
      if (!u) return `Unit ${index + 1}`;
      return u.title || `Unit ${index + 1}`;
    }

    /**
     * Renders the primary learning interface (Learn tab).
     * Displays the video player, lesson list, and progress tracker.
     */
    function renderLearnTab() {
      const container = document.getElementById('tab-learn');
      if (!container) return;
      const course = COURSES.find((c) => c.id === state.activeCourseId);
      const progress = course ? getCourseProgress(course) : null;
      const pVar = progress ? `${progress.completionPercent}%` : '0%';
      container.innerHTML = `
        <header style="margin-bottom:16px; display:flex; align-items:center; justify-content:space-between;">
          <div>
            <h1 class="page-title" id="tab-learn-label">${course ? course.title : 'Select a Course'}</h1>
            <p class="page-subtitle">${course ? (course.level + ' • ' + course.hours) : 'Open a course from Dashboard or My Courses'}</p>
            ${progress ? `<div class="label-subtle" style="margin-top:6px;">${progress.completionPercent}% Completed</div>` : ''}
          </div>
          <div class="progress-circle" style="--p:${pVar};">${progress ? progress.completionPercent : 0}%</div>
        </header>
        <section class="player-grid" id="playerGrid"></section>
      `;
      renderCoursePlayer();
    }

    /**
     * Renders the interactive course player interface.
     * Handles video playback, sidebar navigation, progress tracking, quizzes, and reviews.
     * @param {string} [courseId] - Optional ID of the course to render. Defaults to state.activeCourseId.
     */
    function renderCoursePlayer(courseId) {
      const grid = document.getElementById('playerGrid');
      if (!grid) return;

      const activeCourseId = courseId || state.activeCourseId;
      if (!activeCourseId) {
        grid.innerHTML = `<div class="video-frame">Select a Course</div>`;
        return;
      }

      // Find course data from the coursesData object or fallback to legacy COURSES array
      const courseData = coursesData[activeCourseId];

      if (courseData) {
        // Initialize user-specific and course-specific storage keys for persistence
        const currentUserID = localStorage.getItem('userId') || 'anonymous';
        const PROGRESS_KEY = `user_${currentUserID}_progress_${activeCourseId}`;
        const QUIZ_KEY = `user_${currentUserID}_quiz_${activeCourseId}`;

        // Create a mapping of lesson IDs to a global index for easy completion tracking
        const lessonIndexMap = {};
        let globalLessonIndex = 0;
        courseData.sections.forEach((section, sectionIdx) => {
          section.lessons.forEach(lesson => {
            if (lesson.type === 'video') {
              lessonIndexMap[lesson.id] = globalLessonIndex++;
            }
          });
        });

        // Load or initialize course-specific progress from global state or localStorage
        let completedLessons = new Set();
        const courseState = state.courses[activeCourseId] || {};
        
        if (!state.courses[activeCourseId]) {
          state.courses[activeCourseId] = { completedLessons: [], quizAttempts: {}, completed: false };
        }

        if (courseState.completedLessons) {
          completedLessons = new Set(courseState.completedLessons);
        } else {
          try {
            const savedProgress = localStorage.getItem(PROGRESS_KEY);
            if (savedProgress) {
              const parsed = JSON.parse(savedProgress);
              completedLessons = new Set(parsed);
              state.courses[activeCourseId].completedLessons = parsed;
            }
          } catch (e) {
            console.error('Error loading course progress:', e);
          }
        }

        // Dynamically build the sidebar navigation containing sections, video lessons, and quizzes
        let sidebarHtml = '';
        let prevItemCompleted = true; // First item is always unlocked
        courseData.sections.forEach((section, sIdx) => {
          section.lessons.forEach(lesson => {
            const isCompleted = lesson.type === 'video' 
              ? completedLessons.has(lessonIndexMap[lesson.id])
              : hasPassedQuiz(sIdx);
            
            const isLocked = !prevItemCompleted;
            const icon = isCompleted ? '<span style="color: #28a745; font-weight: bold;">✓</span>' : (isLocked ? '🔒' : (lesson.type === 'video' ? '▶' : '❓'));
            const completedClass = isCompleted ? 'completed' : (isLocked ? 'locked' : '');

            // Append item HTML with data-locked attribute for validation
            sidebarHtml += `
                <div class="lecture-item ${completedClass}" data-id="${lesson.id}" data-type="${lesson.type}" data-section-idx="${sIdx}" data-locked="${isLocked}" style="cursor: ${isLocked ? 'not-allowed' : 'pointer'}; padding: 0.8rem 1rem; display: flex; align-items: center; gap: 10px; border-bottom: 1px dashed rgba(59, 130, 246, 0.1); opacity: ${isLocked ? '0.7' : '1'};">
                    <div class="lecture-play" style="${isCompleted ? 'background: rgba(40, 167, 69, 0.2);' : (isLocked ? 'background: rgba(0,0,0,0.1);' : '')}">${icon}</div>
                    <div class="lesson-title" style="font-size: 14px; font-weight: 500;">${lesson.title}</div>
                    <div class="label-subtle" style="margin-left: auto;">${lesson.type === 'video' ? lesson.duration + 'm' : 'Quiz'}</div>
                </div>
            `;
            
            prevItemCompleted = isCompleted;
          });
        });

        // Render the main player layout including video, controls, tabs, and sidebar
        grid.innerHTML = `
          <section>
            <!-- Video Player Container -->
            <div class="video-frame">
              <video id="mainVideo" controls style="width: 100%; height: 100%; border-radius: 12px; border: 1px solid var(--border-color);">
                <source src="" type="video/mp4">
              </video>
            </div>
            <!-- Playback Controls (Prev, Status, Next, Mark as Read) -->
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 16px; gap: 12px; flex-wrap: wrap;">
              <button id="prevBtn" onclick="navigateLesson(-1)"
                style="padding: 10px 20px; background: var(--primary-color); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 8px;">
                ← Previous
              </button>
              <span id="lessonIndicator" style="color: var(--text-secondary); font-size: 14px;"></span>
              <div style="display: flex; gap: 12px; align-items: center;">
                <button id="markReadBtn" onclick="markLessonAsComplete()"
                  style="padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 8px;">
                  ✓ Mark as Read
                </button>
                <button id="nextBtn"
                  style="padding: 10px 20px; background: #6c757d; color: white; border: none; border-radius: 8px; cursor: not-allowed; font-size: 14px; display: flex; align-items: center; gap: 8px; opacity: 0.5;" disabled>
                  🔒 Next →
                </button>
              </div>
            </div>

            <!-- Content Tabs (Overview, Comments, Notes) -->
            <div class="player-tabs" style="margin-top: 2rem; border-bottom: 1px solid var(--border-color); display: flex; gap: 2rem;">
              <button class="player-tab-btn active" data-player-tab="overview" style="background: none; border: none; padding: 1rem 0; color: #fff; font-weight: 700; cursor: pointer; border-bottom: 2px solid var(--accent-blue);">Overview</button>
              <button class="player-tab-btn" data-player-tab="comments" style="background: none; border: none; padding: 1rem 0; color: #a0aec0; font-weight: 600; cursor: pointer;">Comments & Q&A</button>
              <button class="player-tab-btn" data-player-tab="notes" style="background: none; border: none; padding: 1rem 0; color: #a0aec0; font-weight: 600; cursor: pointer;">Notes</button>
            </div>

            <div id="playerTabContent" style="padding: 1.5rem 0;">
              <!-- Dynamic Lesson Information Panel -->
              <div id="playerTab-overview" class="player-tab-panel">
                <h3 id="playerLessonTitle" style="margin-bottom: 0.5rem;"></h3>
                <p id="playerLessonDesc" style="color: #a0aec0; line-height: 1.6;"></p>
              </div>

              <!-- Interactive Comments Section -->
              <div id="playerTab-comments" class="player-tab-panel" hidden>
                <div style="background: rgba(255,255,255,0.03); padding: 1.5rem; border-radius: 12px; margin-bottom: 2rem;">
                  <h4 style="margin-bottom: 1rem;">Post a Comment</h4>
                  <textarea id="commentInput" placeholder="Ask a question or share your thoughts..." style="width: 100%; min-height: 100px; background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); border-radius: 8px; color: #fff; padding: 1rem; margin-bottom: 1rem;"></textarea>
                  <div style="display: flex; justify-content: flex-end;">
                    <button id="postCommentBtn" class="btn" style="padding: 0.7rem 2rem;">Post Comment</button>
                  </div>
                </div>
                <div id="commentsList" style="display: flex; flex-direction: column; gap: 1.5rem;">
                  <div style="text-align: center; color: #a0aec0; padding: 2rem;">Loading comments...</div>
                </div>
              </div>

              <!-- Personal Notes Section (Future Feature) -->
              <div id="playerTab-notes" class="player-tab-panel" hidden>
                <p style="color: #a0aec0;">Personal notes feature coming soon.</p>
              </div>
            </div>
          </section>
          <!-- Sidebar containing Course Content and Reviews -->
          <aside class="sidebar" style="max-height: 600px; overflow-y: auto;">
            ${sidebarHtml}
            
            <!-- Interactive Course Review Section -->
            <div style="margin-top: 2rem; padding: 1.5rem; background: rgba(59, 130, 246, 0.05); border-top: 1px solid var(--border-color);">
              <h4 style="margin-bottom: 1rem;">Course Review</h4>
              <div id="reviewForm">
                <div class="star-rating" style="display: flex; gap: 5px; margin-bottom: 1rem; font-size: 1.5rem;">
                  <span class="star" data-rating="1" style="cursor: pointer; color: #4b5563;">★</span>
                  <span class="star" data-rating="2" style="cursor: pointer; color: #4b5563;">★</span>
                  <span class="star" data-rating="3" style="cursor: pointer; color: #4b5563;">★</span>
                  <span class="star" data-rating="4" style="cursor: pointer; color: #4b5563;">★</span>
                  <span class="star" data-rating="5" style="cursor: pointer; color: #4b5563;">★</span>
                </div>
                <textarea id="reviewText" placeholder="Write your review here..." style="width: 100%; min-height: 80px; background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); border-radius: 8px; color: #fff; padding: 0.8rem; margin-bottom: 1rem; font-size: 14px;"></textarea>
                <button id="submitReviewBtn" class="btn" style="width: 100%; padding: 0.7rem;">Submit Review</button>
              </div>
              <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 1.5rem 0;">
              <div id="courseReviewsList" style="display: flex; flex-direction: column; gap: 1rem;">
                <!-- Reviews populated here -->
              </div>
            </div>
          </aside>
        `;

        // Create a flat array of all lessons for linear navigation across sections
        let allLessons = [];
        let sectionMap = []; // Map each lesson to its parent section index

        courseData.sections.forEach((section, sectionIndex) => {
          section.lessons.forEach(lesson => {
            if (lesson.type === 'video') {
              allLessons.push({ ...lesson, sectionTitle: section.title, sectionIndex });
              sectionMap.push(sectionIndex);
            }
          });
        });

        /**
         * Persists the current course progress to global state and localStorage.
         * @param {Set} completedSet - Set of completed lesson indices.
         */
        function saveProgress(completedSet) {
          try {
            if (!state.courses[activeCourseId]) {
              state.courses[activeCourseId] = { completedLessons: [], quizAttempts: {}, completed: false };
            }
            
            const progressArray = Array.from(completedSet);
            state.courses[activeCourseId].completedLessons = progressArray;
            saveState(); // Update global state
            
            // Backup to namespaced localStorage key
            localStorage.setItem(PROGRESS_KEY, JSON.stringify(progressArray));
          } catch (e) {
            console.error('Error saving course progress:', e);
          }
        }

        /**
         * Loads the quiz attempts for the current course.
         * @returns {Object} - Map of section indices to attempt arrays.
         */
        function loadQuizAttempts() {
          if (!state.courses[activeCourseId]) {
            state.courses[activeCourseId] = { completedLessons: [], quizAttempts: {}, completed: false };
          }
          if (!state.courses[activeCourseId].quizAttempts) {
            state.courses[activeCourseId].quizAttempts = {};
          }
          return state.courses[activeCourseId].quizAttempts;
        }

        /**
         * Saves a quiz attempt result for a specific section.
         * @param {number} sectionIndex - Index of the section.
         * @param {boolean} passed - Whether the quiz was passed.
         */
        function saveQuizAttempt(sectionIndex, passed) {
          if (!state.courses[activeCourseId]) {
            state.courses[activeCourseId] = { completedLessons: [], quizAttempts: {}, completed: false };
          }
          if (!state.courses[activeCourseId].quizAttempts) {
            state.courses[activeCourseId].quizAttempts = {};
          }
          
          if (!state.courses[activeCourseId].quizAttempts[sectionIndex]) {
            state.courses[activeCourseId].quizAttempts[sectionIndex] = [];
          }
          state.courses[activeCourseId].quizAttempts[sectionIndex].push({ passed, timestamp: Date.now() });
          saveState();
          
          // Backup to namespaced localStorage key
          localStorage.setItem(QUIZ_KEY, JSON.stringify(state.courses[activeCourseId].quizAttempts));
        }

        /**
         * Checks if the user has successfully passed the quiz for a section.
         * @param {number} sectionIndex - Index of the section.
         * @returns {boolean} - True if at least one attempt was successful.
         */
        function hasPassedQuiz(sectionIndex) {
          const attempts = loadQuizAttempts();
          if (!attempts[sectionIndex]) return false;
          return attempts[sectionIndex].some(attempt => attempt.passed);
        }

        // Track the current lesson index for navigation and progress tracking
        let currentLessonIndex = 0;

        /**
         * Determines if a lesson is the first in its section (excluding the very first section).
         * @param {number} index - Lesson index.
         * @returns {boolean}
         */
        function isFirstLessonOfSection(index) {
          if (index === 0) return false;
          const currentSection = sectionMap[index];
          const prevSection = sectionMap[index - 1];
          return currentSection !== prevSection;
        }

        /**
         * Determines if the previous lesson was the final one in its section.
         * @param {number} index - Current lesson index.
         * @returns {boolean}
         */
        function isPreviousLessonLastInSection(index) {
          if (index === 0) return false;
          const currentSection = sectionMap[index];
          const prevSection = sectionMap[index - 1];
          return prevSection !== currentSection && index > 0;
        }

        /**
         * Checks if all video lessons in a given section have been completed.
         * @param {number} sectionIndex - Index of the section.
         * @returns {boolean}
         */
        function areAllVideosInSectionCompleted(sectionIndex) {
          const section = courseData.sections[sectionIndex];
          if (!section) return false;
          
          return section.lessons
            .filter(l => l.type === 'video')
            .every(l => {
              const idx = lessonIndexMap[l.id];
              return completedLessons.has(idx);
            });
        }

        /**
         * Loads and renders a specific lesson by its index in the flat allLessons array.
         * Updates the video player, indicators, buttons, and sidebar highlighting.
         * @param {number} index - Index of the lesson to load.
         */
        function loadLessonByIndex(index) {
          if (index < 0 || index >= allLessons.length) return;

          const lesson = allLessons[index];
          const sidebarItem = grid.querySelector(`.lecture-item[data-id="${lesson.id}"]`);
          
          // Validation: Ensure the video is not locked
          if (sidebarItem && sidebarItem.getAttribute('data-locked') === 'true') {
            showNotification('Please complete the previous video first to unlock this one.', 'info');
            return;
          }

          const isCompleted = completedLessons.has(index);

          currentLessonIndex = index;
          state.activeUnitIndex = index; // Save current index to global state
          saveState();

          // Update video source or create video element if missing
          let video = document.getElementById('mainVideo');
          if (!video) {
            const videoFrame = grid.querySelector('.video-frame');
            if (videoFrame) {
              videoFrame.innerHTML = `<video id="mainVideo" controls style="width: 100%; height: 100%; border-radius: 12px; border: 1px solid var(--border-color);"><source src="" type="video/mp4"></video>`;
              video = document.getElementById('mainVideo');
            }
          }

          if (video) {
            video.src = lesson.content;
            video.play();
          }

          // Update the text indicator showing current progress
          const indicator = document.getElementById('lessonIndicator');
          if (indicator) {
            indicator.textContent = `Lesson ${index + 1} of ${allLessons.length}: ${lesson.title}${isCompleted ? ' ✓' : ''}`;
          }

          // Update state and visual properties of navigation buttons
          updateNavigationButtons();

          // Highlight the currently active lesson in the sidebar navigation
          grid.querySelectorAll('.lecture-item').forEach(el => el.classList.remove('active'));
          const activeItem = grid.querySelector(`[data-id="${lesson.id}"]`);
          if (activeItem) activeItem.classList.add('active');

          // Refresh the comments section for the newly selected lesson
          loadLessonComments(activeCourseId, lesson.id);
          
          // Update the overview tab with lesson-specific metadata
          const titleEl = document.getElementById('playerLessonTitle');
          const descEl = document.getElementById('playerLessonDesc');
          if (titleEl) titleEl.textContent = lesson.title;
          if (descEl) descEl.textContent = `Learn about ${lesson.title} in this detailed video lesson from our ${courseData.title} course.`;
        }

        // --- Comments & Reviews Data Fetching and Rendering ---

        /**
         * Fetches and displays comments for a specific lesson from the server.
         * @param {string} courseId - The ID of the course.
         * @param {string} lessonId - The ID of the lesson.
         */
        function loadLessonComments(courseId, lessonId) {
          const list = document.getElementById('commentsList');
          if (!list) return;
          
          fetch(`/api/courses/${courseId}/lessons/${lessonId}/comments`)
            .then(res => res.json())
            .then(data => {
              if (data.success) {
                if (data.comments.length === 0) {
                  list.innerHTML = '<div style="text-align: center; color: #a0aec0; padding: 2rem;">No comments yet. Be the first to ask a question!</div>';
                } else {
                  list.innerHTML = data.comments.map(c => `
                    <div style="background: rgba(255,255,255,0.02); padding: 1.2rem; border-radius: 10px; border: 1px solid rgba(255,255,255,0.05);">
                      <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                        <span style="font-weight: 700; color: var(--accent-blue);">${c.user_name}</span>
                        <span style="font-size: 12px; color: #a0aec0;">${new Date(c.created_at).toLocaleDateString()}</span>
                      </div>
                      <p style="color: #cbd5e0; font-size: 14px; line-height: 1.5;">${c.text}</p>
                    </div>
                  `).join('');
                }
              }
            });
        }

        /**
         * Fetches and displays reviews for the entire course from the server.
         * @param {string} courseId - The ID of the course.
         */
        function loadCourseReviews(courseId) {
          const list = document.getElementById('courseReviewsList');
          if (!list) return;
          
          fetch(`/api/courses/${courseId}/reviews`)
            .then(res => res.json())
            .then(data => {
              if (data.success) {
                if (data.reviews.length === 0) {
                  list.innerHTML = '<div style="text-align: center; color: #a0aec0; padding: 1rem; font-size: 13px;">No reviews yet.</div>';
                } else {
                  list.innerHTML = data.reviews.map(r => `
                    <div style="background: rgba(255,255,255,0.02); padding: 1rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05);">
                      <div style="display: flex; justify-content: space-between; margin-bottom: 0.3rem;">
                        <span style="font-weight: 700; font-size: 13px; color: #fff;">${r.user_name}</span>
                        <span style="color: #fbbf24;">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</span>
                      </div>
                      <p style="color: #a0aec0; font-size: 13px; line-height: 1.4;">${r.text}</p>
                    </div>
                  `).join('');
                }
              }
            });
        }

        // Initialize course reviews on load
        loadCourseReviews(activeCourseId);

        // --- UI Interaction Event Listeners ---

        // Handle player tab switching (Overview, Comments, Notes)
        grid.querySelectorAll('.player-tab-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const tab = btn.getAttribute('data-player-tab');
            // Reset active states for all tab buttons
            grid.querySelectorAll('.player-tab-btn').forEach(b => {
              b.classList.remove('active');
              b.style.color = '#a0aec0';
              b.style.borderBottom = 'none';
            });
            // Apply active styles to clicked button
            btn.classList.add('active');
            btn.style.color = '#fff';
            btn.style.borderBottom = '2px solid var(--accent-blue)';
            
            // Toggle visibility of tab panels
            grid.querySelectorAll('.player-tab-panel').forEach(p => p.setAttribute('hidden', 'hidden'));
            const activePanel = grid.querySelector(`#playerTab-${tab}`);
            if (activePanel) activePanel.removeAttribute('hidden');
          });
        });

        // Handle comment submission for the current lesson
        const postCommentBtn = document.getElementById('postCommentBtn');
        if (postCommentBtn) {
          postCommentBtn.addEventListener('click', () => {
            const input = document.getElementById('commentInput');
            const text = input.value.trim();
            const currentLesson = allLessons[currentLessonIndex];
            
            if (!text) return;
            
            postCommentBtn.disabled = true;
            postCommentBtn.textContent = 'Posting...';
            
            // Send the comment data to the backend API
            fetch(`/api/courses/${activeCourseId}/lessons/${currentLesson.id}/comments`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ userId: currentUserID, text })
            })
            .then(res => res.json())
            .then(data => {
              if (data.success) {
                input.value = ''; // Clear input field
                loadLessonComments(activeCourseId, currentLesson.id); // Refresh comments list
                showNotification('Comment posted!', 'success');
              }
              postCommentBtn.disabled = false;
              postCommentBtn.textContent = 'Post Comment';
            });
          });
        }

        // Handle star rating selection for course reviews
        let selectedRating = 0;
        grid.querySelectorAll('.star').forEach(star => {
          star.addEventListener('click', () => {
            selectedRating = parseInt(star.getAttribute('data-rating'));
            // Visual update of stars based on selection
            grid.querySelectorAll('.star').forEach(s => {
              const r = parseInt(s.getAttribute('data-rating'));
              s.style.color = r <= selectedRating ? '#fbbf24' : '#4b5563';
            });
          });
        });

        // Handle course review submission
        const submitReviewBtn = document.getElementById('submitReviewBtn');
        if (submitReviewBtn) {
          submitReviewBtn.addEventListener('click', () => {
            const text = document.getElementById('reviewText').value.trim();
            if (selectedRating === 0 || !text) {
              showNotification('Please provide a rating and a review text.', 'info');
              return;
            }
            
            submitReviewBtn.disabled = true;
            submitReviewBtn.textContent = 'Submitting...';
            
            // Send the review data to the backend API
            fetch(`/api/courses/${activeCourseId}/reviews`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ userId: currentUserID, rating: selectedRating, text })
            })
            .then(res => res.json())
            .then(data => {
              if (data.success) {
                document.getElementById('reviewText').value = '';
                selectedRating = 0;
                // Reset stars color
                grid.querySelectorAll('.star').forEach(s => s.style.color = '#4b5563');
                loadCourseReviews(activeCourseId); // Refresh reviews list
                showNotification('Review submitted!', 'success');
              }
              submitReviewBtn.disabled = false;
              submitReviewBtn.textContent = 'Submit Review';
            });
          });
        }

        /**
         * Navigates to the next or previous lesson based on the provided direction.
         * @param {number} direction - 1 for next, -1 for previous.
         */
        window.navigateLesson = function(direction) {
          const newIndex = currentLessonIndex + direction;
          if (newIndex >= 0 && newIndex < allLessons.length) {
            loadLessonByIndex(newIndex);
          }
        };

        /**
         * Marks the currently playing lesson as completed.
         * Awards points, updates progress, and triggers notifications and UI updates.
         */
        window.markLessonAsComplete = function() {
          if (!completedLessons.has(currentLessonIndex)) {
            completedLessons.add(currentLessonIndex);
            // Notify user of completion
            pushClientNotification({ type: 'video_completed', title: 'Video Lesson Complete', message: `Video lesson marked as completed.` });
            saveProgress(completedLessons); // Persist progress to state and storage

            // Award points for completing the lesson
            state.points = (state.points || 0) + 10;
            saveState(); // Update global persistence
            renderHeaderSummary(); // Refresh UI points display

            // Provide visual feedback on the completion button
            const markReadBtn = document.getElementById('markReadBtn');
            if (markReadBtn) {
              markReadBtn.innerHTML = '✓ Completed';
              markReadBtn.style.background = '#218838';
            }

            // Update the sidebar navigation to show completion status
            const activeLesson = allLessons[currentLessonIndex];
            if (activeLesson) {
              const sidebarItem = grid.querySelector(`[data-id="${activeLesson.id}"]`);
              if (sidebarItem) {
                sidebarItem.classList.add('completed');
                const playIcon = sidebarItem.querySelector('.lecture-play');
                if (playIcon) {
                  playIcon.innerHTML = '<span style="color: #28a745; font-weight: bold;">✓</span>';
                  playIcon.style.color = '#28a745';
                }
                
                // Unlock the next item in the sidebar immediately
                const nextItem = sidebarItem.nextElementSibling;
                if (nextItem && nextItem.classList.contains('lecture-item')) {
                  nextItem.setAttribute('data-locked', 'false');
                  nextItem.style.opacity = '1';
                  nextItem.style.cursor = 'pointer';
                  const nextPlayIcon = nextItem.querySelector('.lecture-play');
                  if (nextPlayIcon) {
                    const type = nextItem.getAttribute('data-type');
                    nextPlayIcon.innerHTML = type === 'video' ? '▶' : '❓';
                    nextPlayIcon.style.background = '';
                  }
                }
              }
            }

            // Logic to trigger the quiz gate if this is the final video in a section
            const currentSectionIndex = sectionMap[currentLessonIndex];
            const isLastInSection = currentLessonIndex === allLessons.length - 1 ||
                                   sectionMap[currentLessonIndex + 1] !== currentSectionIndex;

            if (isLastInSection) {
              // Trigger the quiz after a short delay for better UX
              setTimeout(() => {
                window.showQuizGate(currentSectionIndex);
              }, 1500);
            } else {
              // Automatically navigate to the next video
              setTimeout(() => {
                window.navigateLesson(1);
              }, 1500);
            }

            // Update navigation button states (enable/disable Next button)
            updateNavigationButtons();

            // Refresh the textual indicator
            const indicator = document.getElementById('lessonIndicator');
            if (indicator) {
              indicator.textContent = `Lesson ${currentLessonIndex + 1} of ${allLessons.length}: ${activeLesson.title} ✓`;
            }

            // Check if the entire course is now ready for completion
            checkCourseCompletion();

            showNotification('Video marked as complete! You can now proceed to the next video.', 'success');
          }
        };

          notification.style.cssText = `

          // Handle Previous button state
          if (prevBtn) {
            prevBtn.disabled = currentLessonIndex <= 0;
            prevBtn.style.opacity = currentLessonIndex <= 0 ? '0.5' : '1';
            prevBtn.style.cursor = currentLessonIndex <= 0 ? 'not-allowed' : 'pointer';

          // Handle Mark as Read button visibility and styling

            const isCompleted = completedLessons.has(currentLessonIndex);
            markReadBtn.style.display = 'flex';
            if (isCompleted) {
              markReadBtn.innerHTML = '✓ Completed';
              markReadBtn.style.background = '#218838';
              markReadBtn.disabled = true;
              markReadBtn.style.cursor = 'default';
            } else {
              markReadBtn.innerHTML = '✓ Mark as Read';
              markReadBtn.style.background = '#28a745';
              markReadBtn.disabled = false;
              markReadBtn.style.cursor = 'pointer';

            const currentSectionIndex = sectionMap[currentLessonIndex];

            const quizPassed = hasPassedQuiz(currentSectionIndex);
            const isVideoCompleted = completedLessons.has(currentLessonIndex);

            if (item.getAttribute('data-locked') === 'true') {
              if (type === 'quiz') {
                showNotification('Please complete all 4 videos first', 'info');
              } else {
                showNotification('Please complete the previous video first to unlock this one.', 'info');
              }
              return;
            }

            const id = item.getAttribute('data-id');

            if (type === 'video') {
              let foundLesson = null;
              // Find the clicked lesson in the course structure
              courseData.sections.forEach(s => {
                const l = s.lessons.find(less => less.id === id);
                if (l) foundLesson = l;
              });

              if (foundLesson) {
                const lessonIndex = allLessons.findIndex(l => l.id === foundLesson.id);
                loadLessonByIndex(lessonIndex);
              }
            } else if (type === 'quiz') {
              const sIdx = item.getAttribute('data-section-idx');
              if (sIdx !== null) {
                startQuiz(parseInt(sIdx));
              }
            }
          });
        });

        // Initial rendering logic: load the current lesson, the first incomplete lesson, or the completion screen
        if (allLessons.length > 0) {
          const isCourseCompleted = state.courses[activeCourseId] && state.courses[activeCourseId].completed;
          if (isCourseCompleted) {
            // Render a "Course Completed" dashboard if the course is already finished
            const videoFrame = grid.querySelector('.video-frame');
            if (videoFrame) {
              videoFrame.innerHTML = `
                <div style="

                    Congratulations! You have successfully completed this course. You can now start other courses or review the material here.

                </div>

            if (indicator) indicator.textContent = 'Course Completed';
            
            grid.querySelectorAll('.lecture-item').forEach(el => el.classList.remove('active'));
          } else {
            // Load the index from state.activeUnitIndex if available
            const savedIndex = state.activeUnitIndex || 0;
            const lessonToLoad = (savedIndex < allLessons.length) ? savedIndex : 0;
            loadLessonByIndex(lessonToLoad);
          }
        }
        return;
      }

      // --- Legacy Fallback for older course structures (using COURSES array) ---
      const course = COURSES.find((c) => c.id === activeCourseId);
      if (!course) { grid.innerHTML = `<div class="video-frame">Select a Course</div>`; return; }
      const units = Array.isArray(course.units) ? course.units : [];
      const cState = state.courses[course.id] || { completedUnits: 0, completed: false };
      const p = getCourseProgress(course);
      const idx = Math.max(0, Math.min(state.activeUnitIndex || 0, units.length - 1));
      state.activeUnitIndex = idx;
      const active = units[idx];
      const isLesson = active && active.type === 'lesson';
      const locked = idx > p.completedUnits;
      const canComplete = !locked && idx === p.completedUnits;

      // Handle final test UI for legacy courses
      if (cState.finalTestUnlocked && !cState.finalTestPassed) {
        grid.innerHTML = `
          <section>
            <div class="player-tab-content" id="finalTestHost"></div>
          </section>
          <aside class="sidebar"></aside>
        `;
        const host = document.getElementById('finalTestHost');
        host.innerHTML = `<div style="font-weight:800; margin-bottom:8px;">Final Test</div><div class="label-subtle" style="margin-bottom:10px;">Complete the final test to finish the course and download your certificate.</div><button class="btn" id="startFinalTest" style="padding:0.85rem 1.2rem;">Start Final Test</button>`;
        const startBtn = host.querySelector('#startFinalTest');
        if (startBtn) startBtn.addEventListener('click', () => renderFinalTest(course));
        return;
      }

      // Generate legacy sidebar HTML
      const sidebar = units.map((u, i) => {
        const done = i < p.completedUnits;
        const isQuiz = u.type === 'quiz';
        const isActive = i === idx;
        return `
          <div class="lecture-item${isQuiz ? ' quiz-item' : ''}${done ? ' done' : ''}${isActive ? ' active' : ''}" data-unit="${i}" ${i > p.completedUnits ? 'aria-disabled="true"' : ''}>

      // Build main player UI for legacy courses
      const playerMain = isLesson
        ? `
          <div class="video-frame">${active.title}</div>
          <div class="player-controls">
            <button class="btn-ghost" id="prevLecture">Previous</button>
            <button class="btn-ghost" id="nextLecture">Next</button>
            <button class="btn" id="markComplete" ${canComplete ? '' : 'disabled'}>Mark Lecture Complete</button>

          <div class="player-tabs">

              <button data-tab="overview" class="active">Overview</button>

              <button data-tab="tools">Tools</button>

            <div class="player-tab-content" id="playerTabContent"></div>

        `
        : `
          <div class="video-frame">${active.title}</div>
          <div class="player-controls">
            <button class="btn" id="startQuiz">Start Quiz</button>
          </div>
          <div class="player-tab-content" id="playerTabContent"></div>

      grid.innerHTML = `
        <section>
          ${playerMain}
        </section>
        <aside class="sidebar">
          ${sidebar}
        </aside>

      // Apply animations and attach legacy event listeners
      const vf = grid.querySelector('.video-frame');
      if (vf) { vf.classList.add('fade-enter'); setTimeout(() => vf.classList.remove('fade-enter'), 200); }
      grid.querySelectorAll('[data-unit]').forEach(el => {
        el.addEventListener('click', () => {
          const i = Number(el.getAttribute('data-unit'));
          if (Number.isNaN(i)) return;
          if (i > getCourseProgress(course).completedUnits) return;
          state.activeUnitIndex = i;
          saveState();
          renderCoursePlayer();
        });
      });

      const prev = grid.querySelector('#prevLecture');
      const next = grid.querySelector('#nextLecture');
      const mark = grid.querySelector('#markComplete');
      if (prev) prev.addEventListener('click', () => { state.activeUnitIndex = Math.max(0, state.activeUnitIndex - 1); saveState(); renderCoursePlayer(); });
      if (next) next.addEventListener('click', () => { state.activeUnitIndex = Math.min(units.length - 1, state.activeUnitIndex + 1); saveState(); renderCoursePlayer(); });
      if (mark) mark.addEventListener('click', () => { if (canComplete) completeCurrentUnit(); });
      const startQuiz = grid.querySelector('#startQuiz');
      if (startQuiz) startQuiz.addEventListener('click', () => renderQuiz(course, idx));
      setupPlayerTabs(course, idx);
    }

    /**
     * Completes the current unit for legacy courses.
     * Updates state, awards points, and handles progression to the next unit.
     */
    function completeCurrentUnit() {
      if (!state.activeCourseId) return;
      const course = COURSES.find((c) => c.id === state.activeCourseId);
      if (!course) return;
      const units = Array.isArray(course.units) ? course.units : [];
      const idx = state.activeUnitIndex || 0;
      let courseState = state.courses[course.id] || { completedUnits: 0, completed: false };
      
      // Prevent redundant completion or completion of future units
      if (idx < courseState.completedUnits) return;
      if (idx > courseState.completedUnits) return;

      const currentUnit = units[idx];
      courseState.completedUnits = idx + 1;
      
      // Check if this was the final unit in the course
      if (courseState.completedUnits >= units.length) {
        courseState.finalTestUnlocked = true;
      }
      state.courses[course.id] = courseState;
      
      // Award points and update gamification metrics
      state.points = (state.points || 0) + 10;
      updateStreak(true);
      saveState();
      renderHeaderSummary(); // Update UI in real-time

      // Trigger a client-side notification for the milestone
      pushClientNotification({ 
        type: 'video_completed', 
        title: 'Video Lesson Complete', 
        message: `Video lesson '${currentUnit.title}' completed. You earned 10 points!`, 
        courseId: course.id 
      });

      // Automatically advance to the next unit if available
      if (idx + 1 < units.length) { 
        state.activeUnitIndex = idx + 1; 
        saveState(); 
      }
      renderHeaderSummary();
      renderCurrentTab();
    }

    /**
     * Updates the user's learning streak based on daily activity.
     * @param {boolean} [isActivity=false] - Whether the call represents a completed learning activity.
     */
    function updateStreak(isActivity = false) {
      try {
        const now = new Date();
        const todayStr = now.toISOString().slice(0, 10);
        const lastStr = state.lastCompletionDate;

        // Initialize streak if no prior activity exists
        if (!lastStr) {
          if (isActivity) {
            state.streak = 1;
            state.lastCompletionDate = todayStr;
            saveState();
          }
          return;
        }

        // Do nothing if activity already recorded for today
        if (todayStr === lastStr) {
          return;
        }

        const yesterday = new Date(now);
        yesterday.setDate(yesterday.getDate() - 1);
        const yesterdayStr = yesterday.toISOString().slice(0, 10);

        // Increment streak if activity is consecutive; otherwise, reset or check for breakage
        if (lastStr === yesterdayStr) {
          if (isActivity) {
            state.streak = (state.streak || 0) + 1;
            state.lastCompletionDate = todayStr;
            saveState();
          }
        } else {
          // Reset streak if more than one day has passed since last activity
          if (isActivity) {
            state.streak = 1;
            state.lastCompletionDate = todayStr;
            saveState();
          } else if (state.streak !== 0) {
            state.streak = 0;
            saveState();
          }
        }
      } catch (e) {
        console.error('Error updating streak:', e);
      }
    }

    /**
     * Generates and downloads a professional PDF certificate for a completed course.
     * @param {string} courseId - The ID of the completed course.
     */
    async function downloadCertificate(courseId) {
      const { jsPDF } = window.jspdf;
      const course = COURSES.find((c) => c.id === courseId);
      if (!course) return;

      // 1. Fetch LIVE user data for maximum accuracy (Ensures fresh data on every click)
      const userId = localStorage.getItem('userId');
      let userName = 'Learner';
      
      try {
        // Attempt to fetch fresh profile data from the state first
        if (state.profile && state.profile.fullName && state.profile.fullName !== 'Learner') {
          userName = state.profile.fullName;
        } else {
          // Fallback to localStorage
          userName = localStorage.getItem('userName') || 'Learner';
        }
        
        // If still 'Learner', try to fetch from the API for absolute live data
        if (userName === 'Learner' && userId) {
          const res = await fetch(`/api/learner/request/status?userId=${userId}`);
          const data = await res.json();
          if (data && data.request && data.request.name) {
            userName = data.request.name;
          }
        }
      } catch (err) {
        console.error('Error fetching live user data:', err);
      }

      const courseName = course.title;
      const now = new Date();
      const date = now.toLocaleDateString('en-US', { 
        year: 'numeric', 
        month: 'long', 
        day: 'numeric' 
      });
      const time = now.toLocaleTimeString('en-US', {
        hour: '2-digit',
        minute: '2-digit'
      });
      const dateTimeString = `${date} | ${time}`;

      // 2. Initialize jsPDF (Landscape, points, A4)
      const doc = new jsPDF({
        orientation: 'landscape',
        unit: 'pt',
        format: 'a4'
      });

      const width = doc.internal.pageSize.getWidth();
      const height = doc.internal.pageSize.getHeight();

      // 3. Premium Design Implementation (Udemy/Coursera Style)
      
      // Background (Pure Professional White)
      doc.setFillColor(255, 255, 255);
      doc.rect(0, 0, width, height, 'F');

      // 3a. Official Background Watermark Seal (Subtle, Faded, Double Circle)
      doc.saveGraphicsState();
      doc.setGState(new doc.GState({ opacity: 0.2 })); // Increased opacity for better visibility while maintaining professional look
      doc.setDrawColor(197, 160, 89);
      doc.setTextColor(197, 160, 89);
      doc.setLineWidth(1.5);
      
      // Draw Double Circle Stamp in Background
      const centerX = width / 2;
      const centerY = height / 2;
      doc.circle(centerX, centerY, 130, 'S'); // Outer Circle (Slightly larger)
      doc.circle(centerX, centerY, 120, 'S'); // Inner Circle
      
      // Place Circular Text inside the Ring
      doc.setFontSize(14);
      doc.setFont('helvetica', 'bold');
      const sealText = "OFFICIAL VERIFIED CERTIFICATE - NH NETWORKS - ";
      const characters = sealText.split("");
      const radius = 105;
      characters.forEach((char, i) => {
        const angle = (i * (360 / characters.length)) * (Math.PI / 180);
        const x = centerX + radius * Math.cos(angle);
        const y = centerY + radius * Math.sin(angle);
        doc.text(char, x, y, { angle: (angle * 180 / Math.PI) + 90, align: 'center' });
      });
      
      // Center of Seal Text
      doc.setFontSize(26);
      doc.text('NH', centerX, centerY - 5, { align: 'center' });
      doc.setFontSize(12);
      doc.text('NETWORKS', centerX, centerY + 15, { align: 'center' });
      doc.restoreGraphicsState();

      // Decorative Borders
      // Outer Slate Border (Thin & Elegant)
      doc.setDrawColor(30, 41, 59);
      doc.setLineWidth(1);
      doc.rect(20, 20, width - 40, height - 40, 'S');

      // Inner Gold Accent Border (Premium Style)
      doc.setDrawColor(197, 160, 89);
      doc.setLineWidth(1.5);
      doc.rect(35, 35, width - 70, height - 70, 'S');

      // 4. Content Rendering
      
      // Branding Header
      doc.setTextColor(30, 41, 59);
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(12);
      doc.text('NH NETWORKS LEARNING PLATFORM', width / 2, 70, { align: 'center' });

      // Main Title
      doc.setFontSize(50);
      doc.text('Certificate of Completion', width / 2, 140, { align: 'center' });

      // Formal Statement
      doc.setTextColor(71, 85, 105);
      doc.setFont('times', 'italic');
      doc.setFontSize(20);
      doc.text('This is to certify that', width / 2, 200, { align: 'center' });

      // User Name (LARGE, BOLD, HIGHLIGHTED)
      doc.setTextColor(30, 41, 59);
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(58);
      doc.text(userName.toUpperCase(), width / 2, 275, { align: 'center' });
      
      // Underline for name (Premium Gold Accent)
      doc.setDrawColor(197, 160, 89);
      doc.setLineWidth(2.5);
      doc.line(width / 2 - 250, 290, width / 2 + 250, 290);

      // Success Statement
      doc.setTextColor(71, 85, 105);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(18);
      doc.text('has successfully completed the course', width / 2, 340, { align: 'center' });

      // Course Name (Prominent & Clear)
      doc.setTextColor(30, 41, 59);
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(36);
      doc.text(courseName, width / 2, 395, { align: 'center' });

      // Branding / Platform Name
      doc.setTextColor(71, 85, 105);
      doc.setFontSize(14);
      doc.text(`through NH Networks Learning Platform`, width / 2, 435, { align: 'center' });

      // Footer: Date/Time and Signature
      doc.setTextColor(30, 41, 59);
      doc.setFontSize(12);
      
      // Left Side: Date and Time
      doc.setFont('helvetica', 'bold');
      doc.text(dateTimeString, 150, height - 85, { align: 'center' });
      doc.setDrawColor(30, 41, 59);
      doc.setLineWidth(1);
      doc.line(80, height - 100, 220, height - 100);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(10);
      doc.setTextColor(100, 116, 139);
      doc.text('Issue Date & Time', 150, height - 70, { align: 'center' });

      // Right Side: Authorized Signature
      doc.setTextColor(30, 41, 59);
      doc.setFont('times', 'italic');
      doc.setFontSize(28);
      doc.text('NH Networks', width - 150, height - 110, { align: 'center' });
      doc.line(width - 220, height - 100, width - 80, height - 100);
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(10);
      doc.setTextColor(100, 116, 139);
      doc.text('Authorized Signature', width - 150, height - 70, { align: 'center' });

      // Bottom Reference Text
      doc.setFontSize(9);
      doc.setTextColor(100, 116, 139);
      doc.text(`Issued by NH Networks Learning Platform — Verified Online Credential`, width / 2, height - 40, { align: 'center' });

      // 5. Download Trigger (PDF ONLY - NO IMAGE FALLBACK)
      const safeUserName = userName.replace(/\s+/g, '_');
      const safeCourseName = courseName.replace(/\s+/g, '_');
      doc.save(`certificate_${safeUserName}_${safeCourseName}.pdf`);
      showToast('Premium PDF Certificate generated successfully!');
    }

          if (!tab) return;
          setActiveTab(tab);
        });
      });

      // Handle certificate modal closing
      const closeCertificateBtn = document.getElementById('closeCertificateBtn');
      const certificateBackdrop = document.getElementById('certificateBackdrop');

      if (closeCertificateBtn) {
        closeCertificateBtn.addEventListener('click', closeCertificate);
      }
      if (certificateBackdrop) {
        certificateBackdrop.addEventListener('click', closeCertificate);
      }

      // Initialize initial tab visibility and apply responsive styling
      setActiveTab(state.activeTab || 'profile');
      applyResponsiveLayout();
      window.addEventListener('resize', applyResponsiveLayout);
    });

    /**
     * Applies specific styles to the layout based on the current window size for responsiveness.
     */
    function applyResponsiveLayout() {
      try {
        const mobile = window.innerWidth <= 640;
        const grids = document.querySelectorAll('.course-grid');
        // Update course grid columns for mobile views
        grids.forEach(g => { g.style.gridTemplateColumns = mobile ? 'minmax(0,1fr)' : 'repeat(2, minmax(0,1fr))'; });
        // Scale typography and buttons for smaller screens
        document.querySelectorAll('.page-title').forEach(el => { el.style.fontSize = mobile ? '28px' : ''; });
        document.querySelectorAll('.btn').forEach(b => { b.style.width = mobile ? '100%' : ''; });
      } catch (_) { }
    }

    /**
     * Builds the detailed expansion body for a course card in the dashboard/explore tabs.
     * Generates a descriptive overview, learning points, and a breakdown of course units and sections.
     * @param {string} courseId - The ID of the course to expand.
     */
    function buildExpansionBody(courseId) {
      const course = COURSES.find(c => c.id === courseId);
      if (!course) return;
      const host = document.getElementById(`expandBody-${course.id}`);
      if (!host) return;

      // Define the descriptive overview and learning objectives
      const desc = `
        <div style="display:grid; gap:10px;">
          <div style="font-weight:800; font-size:18px;">${course.title}</div>
          <div class="label-subtle">${course.description}</div>
          <div style="display:grid; gap:6px;">
            <div style="font-weight:700;">What you will learn</div>
            <ul style="padding-left:18px; display:grid; gap:4px;">
              ${course.learnPoints.map(p => `<li>${p}</li>`).join('')}
            </ul>
          </div>
          <div class="label-subtle">Difficulty: ${course.level} • ${course.hours}</div>
        </div>
      `;

      // Group units by section for hierarchical display
      const sections = {};
      (course.units || []).forEach((u) => {
        const key = `Section ${u.section}`;
        if (!sections[key]) sections[key] = [];
        sections[key].push(u);
      });

      // Build the final expansion body HTML
      host.innerHTML = desc + Object.keys(sections).map((name) => {
        // Map individual units (video lessons or quizzes) to HTML
        const list = sections[name].map((u) => {
          if (u.type === 'quiz') {
            return `<div class="quiz-item"><div class="left"><div>❓</div><div>${u.title}</div></div><div class="label-subtle">Quiz</div></div>`;
          }
          return `<div class="lecture-item"><div class="left"><div class="lecture-play">▶</div><div>${u.title}</div></div><div class="label-subtle">${u.duration}</div></div>`;
        }).join('');
        
        // Wrap units in an expandable section component
        return `
          <div class="expansion-section">
            <button type="button">${name}</button>
            <div class="expansion-section-list">${list}</div>
          </div>
        `;
      }).join('') + `
        <!-- Dynamic Review and Comment Sections -->
        <div class="expansion-reviews" style="margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border-color);">
          <h4 style="margin-bottom: 1rem; display: flex; align-items: center; gap: 8px;">
            <span>⭐</span> User Reviews
          </h4>
          <div id="expansion-reviews-list-${course.id}" style="display: grid; gap: 1rem;">
            <div style="text-align: center; color: var(--text-muted); padding: 1rem;">Loading reviews...</div>
          </div>
        </div>
        <div class="expansion-comments" style="margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border-color);">
          <h4 style="margin-bottom: 1rem; display: flex; align-items: center; gap: 8px;">
            <span>💬</span> Video Comments
          </h4>
          <div id="expansion-comments-list-${course.id}" style="display: grid; gap: 0.75rem;">
            <div style="text-align: center; color: var(--text-muted); padding: 1rem;">Loading comments...</div>
          </div>
        </div>
      `;

      // Attach click listeners to section toggle buttons
      host.querySelectorAll('.expansion-section > button').forEach(b => {
        b.addEventListener('click', () => b.parentElement.classList.toggle('open'));
      });
      
      // Load and render external reviews and comments for the course
      fetchAndRenderCourseReviews(courseId, `expansion-reviews-list-${course.id}`);
      fetchAndRenderCourseComments(course, `expansion-comments-list-${course.id}`);
    }

    /**
     * Fetches and renders user reviews for a specific course in the expansion body.
     * @param {string} courseId - The ID of the course.
     * @param {string} containerId - The ID of the HTML container to populate.
     */
    async function fetchAndRenderCourseReviews(courseId, containerId) {
      const container = document.getElementById(containerId);
      if (!container) return;
      
      try {
        const res = await fetch(`/api/courses/${courseId}/reviews`);
        const data = await res.json();
        
        if (data.success && data.reviews && data.reviews.length > 0) {
          container.innerHTML = data.reviews.map(r => `
            <div style="background: rgba(255,255,255,0.02); padding: 1rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05);">
              <div style="display: flex; justify-content: space-between; margin-bottom: 0.3rem;">
                <span style="font-weight: 700; font-size: 13px; color: #fff;">${r.user_name}</span>
                <span style="color: #fbbf24;">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</span>
              </div>
              <p style="color: #a0aec0; font-size: 13px; line-height: 1.4;">${r.text}</p>
            </div>
          `).join('');
        } else {
          container.innerHTML = '<div style="text-align: center; color: var(--text-muted); padding: 1rem; font-size: 13px;">No reviews yet for this course.</div>';
        }
      } catch (err) {
        console.error('Error fetching reviews:', err);
        container.innerHTML = '<div style="text-align: center; color: var(--error); padding: 1rem; font-size: 13px;">Error loading reviews.</div>';
      }
    }

    /**
     * Aggregates and renders comments for all video lessons in a course for the expansion body.
     * @param {Object} course - The course object.
     * @param {string} containerId - The ID of the HTML container to populate.
     */
    async function fetchAndRenderCourseComments(course, containerId) {
      const container = document.getElementById(containerId);
      if (!container) return;

      // Identify all valid video units that can have comments
      const videoLessons = [];
      (course.units || []).forEach((u) => {
        if ((u.type === 'video' || u.type === 'lesson') && u.id) {
          videoLessons.push({ lessonId: u.id, title: u.title });
        }
      });

      if (videoLessons.length === 0) {
        container.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:1rem;font-size:13px;">No videos in this course.</div>';
        return;
      }

      try {
        // Fetch comments for all lessons in parallel to optimize loading time
        const results = await Promise.all(
          videoLessons.map(async (lesson) => {
            try {
              const res = await fetch(`/api/courses/${course.id}/lessons/${lesson.lessonId}/comments`);
              const data = await res.json();
              return { lesson, comments: (data.success && data.comments) ? data.comments : [] };
            } catch (_) {
              return { lesson, comments: [] };
            }
          })
        );

        // Filter and display only lessons that have existing comments
        const withComments = results.filter(r => r.comments.length > 0);

        if (withComments.length === 0) {
          container.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:1rem;font-size:13px;">No comments yet on any video in this course.</div>';
          return;
        }

        // Render comments grouped by video title
        container.innerHTML = withComments.map(({ lesson, comments }) => `
          <div style="border:1px solid var(--border-color);border-radius:10px;overflow:hidden;">
            <div style="padding:0.65rem 1rem;background:rgba(59,130,246,0.08);font-weight:700;font-size:13px;display:flex;align-items:center;gap:8px;">
              <span style="color:var(--accent-blue);">▶</span>
              <span>${lesson.title}</span>
            </div>
            <div style="display:grid;gap:0;">
              ${comments.map((c, i) => `
                <div style="padding:0.75rem 1rem;${i > 0 ? 'border-top:1px solid rgba(59,130,246,0.06);' : ''}">
                  <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
                    <span style="font-weight:700;font-size:13px;color:#e5e7eb;">${c.user_name || 'User'}</span>
                    <span style="font-size:11px;color:var(--text-muted);">${c.created_at ? new Date(c.created_at).toLocaleDateString() : ''}</span>
                  </div>
                  <p style="font-size:13px;color:#a0aec0;line-height:1.5;margin:0;">${c.text}</p>
                </div>
              `).join('')}
            </div>
          </div>
        `).join('');

      } catch (err) {
        console.error('Error fetching course comments:', err);
        container.innerHTML = '<div style="text-align:center;color:var(--error);padding:1rem;font-size:13px;">Error loading comments.</div>';
      }
    }

    /**
     * Enrolls the user in a specific course.
     * Validates current enrollment status before proceeding.
     * @param {string} courseId - The ID of the course to enroll in.
     */
    function enrollCourse(courseId) {
      const course = COURSES.find(c => c.id === courseId);
      if (!course) return;

      // Ensure the user finishes their current enrollment before starting another
      if (state.enrolledCourseId && state.enrolledCourseId !== courseId) {
        const cur = COURSES.find(c => c.id === state.enrolledCourseId);
        const p = cur ? getCourseProgress(cur) : { completed: false };
        if (!p.completed) { 
          showToast('Please complete your current course before enrolling in a new one.'); 
          return; 
        }
      }

      // Update global state with new enrollment data
      const s = state.courses[courseId] || { completedUnits: 0, completed: false };
      state.courses[courseId] = s;
      state.enrolledCourseId = courseId;
      state.activeCourseId = courseId;
      state.activeUnitIndex = s.completedUnits || 0;
      saveState();

      // Send enrollment notification
      pushClientNotification({ type: 'course_started', title: 'Course Started', message: "You've started this course! Good luck!", courseId: courseId });
    }

    /**
     * Displays a simple toast notification at the bottom of the screen.
     * @param {string} text - The message to display.
     */
    function showToast(text) {
      let t = document.getElementById('toast');
      if (!t) {
        t = document.createElement('div');
        t.id = 'toast';
        t.className = 'toast';
        document.body.appendChild(t);
      }
      t.textContent = text || '';
      t.classList.add('show');
      // Hide the toast after 1.5 seconds
      setTimeout(() => t.classList.remove('show'), 1500);
    }

    /**
     * Sends a notification payload to the client notification system (NHNotifications).
     * @param {Object} payload - Notification data including type, title, and message.
     */
    function pushClientNotification(payload) {
      try {
        const userId = parseInt(localStorage.getItem('userId'), 10);
        if (!userId) return;
        const type = String((payload && payload.type) || '').trim();
        const title = String((payload && payload.title) || '').trim();
        const message = String((payload && payload.message) || '').trim();
        const courseId = String((payload && payload.courseId) || '');
        const course = COURSES.find(c => c.id === courseId);
        const courseName = course ? course.title : '';
        
        // Compose a formatted notification message
        const composed = [title, message, courseName ? `Course: ${courseName}` : ''].filter(Boolean).join(' — ');
        
        // Attempt to use the global NHNotifications host if available
        if (window.NHNotifications && typeof window.NHNotifications.push === 'function') {
          window.NHNotifications.push({ userId, activityType: type, message: composed });
          return;
        }

        // Fallback to direct API call if NHNotifications is not present
        fetch('/api/notifications/add', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId, activityType: type, message: composed })
        }).catch(() => { });
      } catch (_) { }
    }

    /**
     * Sets up the tab interface (Overview, Notes, etc.) for the legacy course player.
     * @param {Object} course - The legacy course object.
     * @param {number} index - The index of the active unit.
     */
    function setupPlayerTabs(course, index) {
      const content = document.getElementById('playerTabContent');
      const buttons = document.querySelectorAll('.player-tab-buttons button');
      
      const setTab = (name) => {
        // Toggle active class on tab buttons
        buttons.forEach(b => { if (b.getAttribute('data-tab') === name) b.classList.add('active'); else b.classList.remove('active'); });
        
        // Render content based on the selected tab name
        if (name === 'overview') {
          content.innerHTML = `<div style="font-weight:700; margin-bottom:8px;">Lecture Overview</div><div class="label-subtle">Professional overview and learning goals.</div>`;
        } else if (name === 'notes') {
          renderNotes(course, index);
        } else if (name === 'announcements') {
          content.innerHTML = `<div style="font-weight:700; margin-bottom:8px;">Announcements</div><div class="label-subtle">No announcements.</div>`;
        } else if (name === 'tools') {
          content.innerHTML = `<div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:8px;"><button class="btn-ghost" id="downloadResources">Download Resources</button><button class="btn-ghost" id="bookmarkBtn">Bookmark</button><button class="btn" id="toolsMarkComplete">Mark Lecture Complete</button></div><div style="border-top:1px solid var(--border-color); padding-top:8px;">Discussion</div>`;
          const mark = content.querySelector('#toolsMarkComplete');
          if (mark) mark.addEventListener('click', () => completeCurrentUnit());
        }
      };

      // Attach click listeners to each tab button
      buttons.forEach(b => b.addEventListener('click', () => setTab(b.getAttribute('data-tab'))));
      // Initialize with the overview tab
      setTab('overview');
    }

    /**
     * Renders a simple note-taking interface for a specific unit in a legacy course.
     * Handles local persistence of notes via localStorage.
     * @param {Object} course - The course object.
     * @param {number} index - The unit index.
     */
    function renderNotes(course, index) {
      const content = document.getElementById('playerTabContent');
      const key = `notes:${course.id}:${index}`;
      
      // Load existing notes from storage
      const list = (() => { try { const r = localStorage.getItem(key); return r ? JSON.parse(r) : []; } catch (_) { return []; } })();
      let items = Array.isArray(list) ? list : [];
      
      const save = () => { try { localStorage.setItem(key, JSON.stringify(items)); } catch (_) { } };
      
      // Build the notes UI structure
      content.innerHTML = `<div class="notes-input"><input id="noteInput" placeholder="Add a note" /><button class="btn" id="addNote">Add</button></div><div class="notes-list" id="notesList"></div>`;
      const listEl = content.querySelector('#notesList');
      
      const renderList = () => { 
        listEl.innerHTML = items.map((n, i) => `<div class="note-row"><div>${n}</div><button class="icon-btn secondary" data-del="${i}">Delete</button></div>`).join(''); 
        listEl.querySelectorAll('[data-del]').forEach(b => b.addEventListener('click', () => { 
          const i = Number(b.getAttribute('data-del')); 
          items.splice(i, 1); 
          save(); 
          renderList(); 
        })); 
      };
      
      renderList();
      
      const addBtn = content.querySelector('#addNote');
      const inp = content.querySelector('#noteInput');
      if (addBtn) addBtn.addEventListener('click', () => { 
        const v = (inp.value || '').trim(); 
        if (!v) return; 
        const stamp = `Lecture ${index + 1}`; 
        items.push(`${stamp} - ${v}`); 
        inp.value = ''; 
        save(); 
        renderList(); 
      });
    }

    /**
     * Renders a quiz interface for a specific unit in a legacy course.
     * @param {Object} course - The course object.
     * @param {number} unitIndex - The index of the unit containing the quiz.
     */
    function renderQuiz(course, unitIndex) {
      const grid = document.getElementById('playerGrid');
      const title = lessonTitleFor(course, unitIndex);
      // Generate placeholder quiz questions
      const questions = Array.from({ length: 5 }).map((_, i) => ({ q: `Q${i + 1}`, options: ['A', 'B', 'C', 'D'], correct: 0 }));
      
      grid.innerHTML = `
        <section>
          <div class="player-tab-content" id="quizHost"></div>
        </section>
        <aside class="sidebar"></aside>
      `;
      
      const host = document.getElementById('quizHost');
      host.innerHTML = `<div style="font-weight:800; margin-bottom:8px;">${title}</div>` + questions.map((q, i) => {
        const opts = q.options.map((o, j) => `<label style="display:block; margin:6px 0;"><input type="radio" name="q${i}" value="${j}" /> ${o}</label>`).join('');
        return `<div style="border:1px solid var(--border-color); border-radius:10px; padding:0.6rem 0.8rem; margin-bottom:8px;"><div style="font-weight:700;">${q.q}</div>${opts}</div>`;
      }).join('') + `<div style="display:flex; gap:8px;"><button class="btn" id="submitQuiz">Submit</button><button class="btn-ghost" id="retryQuiz">Retry</button></div>`;
      
      const submit = host.querySelector('#submitQuiz');
      const retry = host.querySelector('#retryQuiz');
      
      if (retry) retry.addEventListener('click', () => renderQuiz(course, unitIndex));
      if (submit) submit.addEventListener('click', () => {
        let score = 0;
        questions.forEach((q, i) => { 
          const sel = host.querySelector(`input[name="q${i}"]:checked`); 
          if (sel && Number(sel.value) === q.correct) score += 1; 
        });
        
        host.innerHTML += `<div style="margin-top:8px;">Score: ${score}/5</div><div style="margin-top:8px;"><button class="btn" id="continueAfterQuiz">Continue</button></div>`;
        
        // Award points for completing the quiz
        state.points = (state.points || 0) + 20;
        updateStreak(true);
        saveState();
        renderHeaderSummary();
        
        pushClientNotification({ type: 'quiz_passed', title: 'Quiz Complete', message: `Quiz for ${title} passed!`, courseId: course.id });
        
        const cont = host.querySelector('#continueAfterQuiz');
        if (cont) cont.addEventListener('click', () => { completeCurrentUnit(); });
      });
    }

    /**
     * Renders the final assessment interface for a legacy course.
     * @param {Object} course - The course object.
     */
    function renderFinalTest(course) {
      const grid = document.getElementById('playerGrid');
      // Generate placeholder final test questions
      const questions = Array.from({ length: 8 }).map((_, i) => ({ q: `Final Q${i + 1}`, options: ['A', 'B', 'C', 'D'], correct: 0 }));
      
      grid.innerHTML = `
        <section>
          <div class="player-tab-content" id="finalHost"></div>
        </section>
        <aside class="sidebar"></aside>
      `;
      
      const host = document.getElementById('finalHost');
      host.innerHTML = `<div style="font-weight:800; margin-bottom:8px;">Final Test</div>` + questions.map((q, i) => {
        const opts = q.options.map((o, j) => `<label style="display:block; margin:6px 0;"><input type="radio" name="fq${i}" value="${j}" /> ${o}</label>`).join('');
        return `<div style="border:1px solid var(--border-color); border-radius:10px; padding:0.6rem 0.8rem; margin-bottom:8px;"><div style="font-weight:700;">${q.q}</div>${opts}</div>`;
      }).join('') + `<div style="display:flex; gap:8px;"><button class="btn" id="submitFinal">Submit Final</button></div>`;
      
      const submit = host.querySelector('#submitFinal');
      if (submit) submit.addEventListener('click', () => {
        let score = 0;
        questions.forEach((q, i) => { 
          const sel = host.querySelector(`input[name="fq${i}"]:checked`); 
          if (sel && Number(sel.value) === q.correct) score += 1; 
        });
        
        // Award completion points and update course status in state
        state.points = (state.points || 0) + 50;
        const cState = state.courses[course.id] || { completedUnits: 0, completed: false };
        cState.finalTestPassed = true;
        cState.completed = true;
        state.courses[course.id] = cState;
        state.enrolledCourseId = null;
        
        updateStreak(true);
        saveState();
        renderHeaderSummary();
        
        // Trigger completion notifications
        pushClientNotification({ type: 'final_test_passed', title: 'Final Test Complete', message: `Final Test for ${course.title} passed! You're almost there!`, courseId: course.id });
        pushClientNotification({ type: 'course_completed', title: 'Course Completed', message: `Congratulations! You've successfully completed ${course.title}!`, courseId: course.id });
        
        // Show the final completion dashboard with certificate download button
        grid.innerHTML = `
          <section>
            <div class="player-tab-content" style="text-align:center; padding:1rem;">
              <div style="font-weight:800; font-size:18px; margin-bottom:8px;">${course.title} Completed</div>
              <div class="label-subtle" style="margin-bottom:12px;">Download your certificate below.</div>
              <button class="btn" id="downloadCert" style="padding:0.85rem 1.2rem;">Download Certificate</button>
            </div>
          </section>
          <aside class="sidebar"></aside>
        `;
        
        const dl = document.getElementById('downloadCert');
        if (dl) dl.addEventListener('click', () => downloadCertificate(course.id));
      });
    }
  </script>
  <script src="notifications.js"></script>
  <script>
    if (window.NHNotifications) {
      NHNotifications.init({ hostSelector: '.topbar-right' });
    }
  </script>
  <script src="footer.js"></script>
</body>
